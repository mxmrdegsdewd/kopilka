<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#F2F2F7" media="(prefers-color-scheme: light)">
<meta name="theme-color" content="#000000" media="(prefers-color-scheme: dark)">
<link rel="manifest" href="manifest.json">
<title>Копилка</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{
--bg:#F2F2F7;--card:#FFF;--card-a:rgba(0,0,0,.04);
--t:#000;--t2:rgba(60,60,67,.6);--t3:rgba(60,60,67,.3);
--sep:rgba(60,60,67,.12);--fill:rgba(118,118,128,.12);
--blue:#007AFF;--grn:#34C759;--red:#FF3B30;--org:#FF9500;
--grn-bg:rgba(52,199,89,.12);--grn-t:#1B8E35;
--red-bg:rgba(255,59,48,.1);--red-t:#D42A20;
--org-bg:rgba(255,149,0,.12);--org-t:#C77800;
--tbar:rgba(247,247,247,.82);--tshd:rgba(0,0,0,.08);
--mbg:#F2F2F7;--mh:rgba(0,0,0,.15);
--sab:env(safe-area-inset-bottom,0px);--cwk:rgba(0,122,255,.06);
font-family:-apple-system,BlinkMacSystemFont,"SF Pro Text","Helvetica Neue","Segoe UI",system-ui,sans-serif;
color-scheme:light dark}
@media(prefers-color-scheme:dark){:root:not([data-theme="light"]){
--bg:#000;--card:#1C1C1E;--card-a:rgba(255,255,255,.06);
--t:#FFF;--t2:rgba(235,235,245,.6);--t3:rgba(235,235,245,.3);
--sep:rgba(84,84,88,.36);--fill:rgba(118,118,128,.24);
--blue:#0A84FF;--grn:#30D158;--red:#FF453A;--org:#FF9F0A;
--grn-bg:rgba(48,209,88,.16);--grn-t:#30D158;
--red-bg:rgba(255,69,58,.16);--red-t:#FF453A;
--org-bg:rgba(255,159,10,.16);--org-t:#FF9F0A;
--tbar:rgba(28,28,30,.82);--tshd:rgba(0,0,0,.5);
--mbg:#2C2C2E;--mh:rgba(255,255,255,.2);--cwk:rgba(10,132,255,.1)}}
:root[data-theme="dark"]{
--bg:#000;--card:#1C1C1E;--card-a:rgba(255,255,255,.06);
--t:#FFF;--t2:rgba(235,235,245,.6);--t3:rgba(235,235,245,.3);
--sep:rgba(84,84,88,.36);--fill:rgba(118,118,128,.24);
--blue:#0A84FF;--grn:#30D158;--red:#FF453A;--org:#FF9F0A;
--grn-bg:rgba(48,209,88,.16);--grn-t:#30D158;
--red-bg:rgba(255,69,58,.16);--red-t:#FF453A;
--org-bg:rgba(255,159,10,.16);--org-t:#FF9F0A;
--tbar:rgba(28,28,30,.82);--tshd:rgba(0,0,0,.5);
--mbg:#2C2C2E;--mh:rgba(255,255,255,.2);--cwk:rgba(10,132,255,.1)}
html{height:100vh;min-height:calc(100% + env(safe-area-inset-top))}
body{height:100vh;background:var(--bg);color:var(--t);overflow:hidden;-webkit-font-smoothing:antialiased;margin:0;display:flex;flex-direction:column}
.app{display:flex;flex-direction:column;height:100vh}
.layout{display:flex;flex-direction:column;flex:1;overflow:hidden}
.mc{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;overscroll-behavior-y:contain;padding-bottom:90px}
.sc{display:none}

/* Header */
.hdr{position:sticky;top:0;z-index:30;background:var(--bg);padding:calc(env(safe-area-inset-top,14px) + 6px) 16px 0 16px;box-shadow:0 4px 0 0 var(--bg)}
.hdr::after{content:'';position:absolute;bottom:-80px;left:0;right:0;height:80px;background:linear-gradient(to bottom,var(--bg),transparent);pointer-events:none;z-index:-1;opacity:0;transition:opacity .3s}
.hdr.scrolled::after{opacity:1}
.hdr.compact{padding:calc(env(safe-area-inset-top,6px) + 8px) 16px 0 16px}
.hdr-row{display:flex;align-items:center;justify-content:space-between}
.hdr-title{font-size:34px;font-weight:700;letter-spacing:.4px;transition:font-size .25s,line-height .25s}
.hdr.compact .hdr-title{font-size:18px;line-height:20px}
.hdr-date{font-size:13px;color:var(--t2);padding:3px 0 10px;transition:all .2s}
.hdr.compact .hdr-date{font-size:11px;padding:0 0 8px;margin-top:-5px;line-height:14px}
.hdr-btn{width:40px;height:40px;border-radius:50%;background:var(--fill);border:.5px solid var(--sep);cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--t)}
.hdr-btn:active{opacity:.6}
.hdr-btn svg{width:18px;height:18px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;margin-left:-1px}

/* Accounts strip */
.accs{display:flex;gap:8px;padding:4px 16px 6px;overflow-x:auto;scrollbar-width:none;position:sticky;top:var(--st-accs,60px);z-index:25;background:var(--bg);box-shadow:0 4px 0 0 var(--bg)}
.accs::-webkit-scrollbar{display:none}
.acc{flex-shrink:0;min-width:100px;padding:8px 12px;background:var(--card);border-radius:12px;cursor:pointer;border:1.5px solid transparent}
.acc:active{transform:scale(.97)}
.acc.tot{background:var(--blue);color:#fff;border-color:transparent}
.acc.tot .ac-n{color:rgba(255,255,255,.7)}
.ac-n{font-size:11px;color:var(--t2);margin-bottom:1px}
.ac-b{font-size:16px;font-weight:700;font-variant-numeric:tabular-nums}

/* Tab bar */
.tbar{position:fixed;bottom:0;left:0;right:0;z-index:100;padding:0 21px 21px;pointer-events:none}
.tbar::before{content:'';position:absolute;bottom:0;left:0;right:0;height:120px;background:linear-gradient(to bottom,transparent 0%,var(--bg) 80%);pointer-events:none;z-index:-1}
.tbar-in{position:relative;display:flex;align-items:center;width:100%;height:62px;background:var(--tbar);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-radius:999px;box-shadow:0 2px 16px rgba(0,0,0,.15);padding:4px 6px;pointer-events:auto;border:.5px solid rgba(255,255,255,.18)}
.tpill{position:absolute;top:4px;bottom:4px;left:4px;width:calc(33.333% - 2.67px);background:var(--fill);border-radius:999px;transition:transform .25s cubic-bezier(.4,0,.14,1);z-index:0}
.tbtn{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;padding:0 4px;border:none;background:0 0;border-radius:999px;cursor:pointer;position:relative;z-index:1;height:100%}
.tbtn:active{opacity:.6}
.tbtn svg{width:24px;height:24px;stroke:var(--t3);fill:none;stroke-width:1.6;stroke-linecap:round;stroke-linejoin:round;transition:all .25s}
.tbtn.on svg{stroke:var(--blue)}
.tbtn .tl{font-size:10px;font-weight:500;color:var(--t3);transition:color .25s}
.tbtn.on .tl{color:var(--blue)}
.tpan{display:none}.tpan.on{display:block}

/* Calendar month header — sticky z:20 */
.cm{margin-bottom:4px}
.cmh{font-size:20px;font-weight:700;padding:12px 16px 4px;position:sticky;top:var(--st-month,110px);background:var(--bg);z-index:20;display:flex;align-items:center;cursor:pointer;user-select:none;gap:8px;box-shadow:0 4px 0 0 var(--bg)}
.cmh .mt{flex:1;text-align:left}
.cmh .mi{font-size:13px;font-weight:500;color:var(--t2);display:none;gap:8px;align-items:center;white-space:nowrap}
.cm.c .mi{display:flex}
.mi .mn{font-weight:600}.mi .mn.p{color:var(--grn)}.mi .mn.n{color:var(--red)}
.mi .mb{color:var(--t3)}
.cmh .ch{width:16px;height:16px;stroke:var(--t3);fill:none;stroke-width:2.5;stroke-linecap:round;stroke-linejoin:round;transition:transform .25s;flex-shrink:0}
.cm.c .ch{transform:rotate(-90deg)}
.cmb{transition:max-height .35s cubic-bezier(.4,0,.2,1)}
.cm.c .cmb{display:none}
.cm-sum{display:flex;gap:12px;justify-content:flex-end;padding:4px 16px 2px;font-size:12px;color:var(--t2)}
.cm-sum span{font-weight:600}
.cm-sum .p{color:var(--grn)}.cm-sum .n{color:var(--red)}
.cm.c .cm-sum{display:none}

/* Week header — sticky below month, z:15 */
.cw{margin:0 16px 6px}
.cwh{position:sticky;top:var(--st-week,146px);z-index:15;background:var(--bg);display:flex;align-items:center;padding:10px 10px;min-height:40px;cursor:pointer;user-select:none;gap:6px}
.cwh:active{opacity:.7}
.cw.cur .cwh{background:var(--bg)}
:root[data-theme="dark"] .cw.cur .cwh{background:var(--bg)}
@media(prefers-color-scheme:dark){:root:not([data-theme="light"]) .cw.cur .cwh{background:var(--bg)}}
.cw.cur .wl{color:var(--blue);font-weight:700}
.wl{font-size:12px;font-weight:600;color:var(--t2);text-transform:uppercase;letter-spacing:.2px;min-width:68px}
.wr{font-size:11px;color:var(--t3);flex:1}
.wi{display:none;align-items:center;gap:6px;font-size:12px;font-variant-numeric:tabular-nums;white-space:nowrap}
.cw.c .wi{display:flex}
.wi .wn{font-weight:600}.wi .wn.p{color:var(--grn)}.wi .wn.n{color:var(--red)}
.wi .wb{color:var(--t2);font-weight:500}
.wch{width:12px;height:12px;stroke:var(--t3);fill:none;stroke-width:2.5;stroke-linecap:round;stroke-linejoin:round;transition:transform .25s;flex-shrink:0}
.cw.c .wch{transform:rotate(-90deg)}
/* Week body = card with days. Animated via JS max-height. */
.cwb{background:var(--card);border-radius:12px;overflow:hidden;transition:max-height .3s cubic-bezier(.4,0,.2,1)}

.cd-row{display:flex;align-items:center;padding:8px 10px;gap:4px;min-height:40px;cursor:pointer}
.cd-row:active{background:var(--card-a)}
.cd-row+.cd-row{border-top:.5px solid var(--sep)}
.cd-row.today{background:rgba(0,80,200,.15)}
:root[data-theme="dark"] .cd-row.today{background:rgba(10,132,255,.12)}
@media(prefers-color-scheme:dark){:root:not([data-theme="light"]) .cd-row.today{background:rgba(10,132,255,.12)}}
.cd-row.today .cd-d{color:var(--blue);font-weight:600}
.cd-d{font-size:13px;flex-shrink:0;min-width:72px;display:flex;align-items:center;white-space:nowrap}
.cd-dn{display:inline-block;width:18px;text-align:left;flex-shrink:0}
.cd-t{flex:1;display:flex;flex-wrap:wrap;gap:2px;min-width:0}
.cd-tg{font-size:10px;font-weight:500;padding:1px 4px;border-radius:4px;white-space:nowrap;line-height:15px}
.cd-tg.inc{background:var(--grn-bg);color:var(--grn-t)}
.cd-tg.exp{background:var(--red-bg);color:var(--red-t)}
.cd-tg.ap{background:var(--grn-bg);color:var(--grn-t)}
.cd-tg.bal-upd{background:rgba(88,86,214,.12);color:#5856D6}
.cd-b.upd{color:#5856D6}
.cd-tg.an{background:var(--org-bg);color:var(--org-t)}
.cd-r{display:flex;align-items:center;gap:6px;flex-shrink:0;justify-content:flex-end}
.cd-dc{font-size:11px;font-weight:500;font-variant-numeric:tabular-nums;white-space:nowrap;color:var(--t3)}
.cd-b{font-size:13px;font-weight:500;text-align:right;font-variant-numeric:tabular-nums;white-space:nowrap;min-width:52px;flex-shrink:0}
.cd-b.ng{color:var(--red)}

/* Payments, sections, cards */
.sl{font-size:13px;color:var(--t2);text-transform:uppercase;padding:24px 16px 6px;letter-spacing:-.08px}
.cg{margin:0 16px;background:var(--card);border-radius:14px;overflow:hidden}
.pi{display:flex;align-items:center;padding:11px 14px;gap:10px;cursor:pointer}
.pi:active{background:var(--card-a)}
.pi+.pi{border-top:.5px solid var(--sep)}
.pi-d{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.pi-d.i{background:var(--grn)}.pi-d.e{background:var(--red)}
.pi-i{flex:1;min-width:0}
.pi-n{font-size:16px}.pi-s{font-size:12px;color:var(--t2);margin-top:1px}
.pi-a{font-size:16px;font-weight:500;font-variant-numeric:tabular-nums;text-align:right}
.pi-a.i{color:var(--grn)}.pi-a.e{color:var(--red)}
.abtn{display:flex;align-items:center;justify-content:center;margin:10px 16px;padding:13px;background:var(--card);border-radius:14px;border:none;font-size:16px;color:var(--blue);cursor:pointer;width:calc(100% - 32px);font-family:inherit}
.abtn:active{background:var(--card-a)}

/* Overview */
.og{display:grid;grid-template-columns:1fr 1fr;gap:2px;margin:8px 16px;border-radius:14px;overflow:hidden}
.oc{background:var(--card);padding:12px;text-align:center}
.ov{font-size:18px;font-weight:700;font-variant-numeric:tabular-nums}
.ol{font-size:10px;color:var(--t2);margin-top:2px}
.chw{margin:10px 16px;background:var(--card);border-radius:14px;padding:12px;height:220px}
.chw canvas{width:100%!important;height:100%!important}
.ebw{margin:0 16px;background:var(--card);border-radius:14px;overflow:hidden}
.ebi{display:flex;align-items:center;padding:8px 14px;gap:8px;font-size:13px}
.ebi+.ebi{border-top:.5px solid var(--sep)}
.ebb{flex:1;height:5px;background:var(--fill);border-radius:3px;overflow:hidden}
.ebf{height:100%;background:var(--red);border-radius:3px}
.ebn{min-width:68px}.eba{font-weight:500;font-variant-numeric:tabular-nums;min-width:60px;text-align:right}.ebp{color:var(--t2);min-width:28px;text-align:right}
.gc{margin:10px 16px;background:var(--card);border-radius:14px;padding:14px;cursor:pointer}
.gc:active{background:var(--card-a)}
.gt{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px}
.gl{font-size:14px;font-weight:600}
.ge{font-size:13px;color:var(--blue);cursor:pointer;background:none;border:none;font-family:inherit}
.gb{height:7px;background:var(--fill);border-radius:4px;overflow:hidden;margin-bottom:6px}
.gf{height:100%;background:var(--grn);border-radius:4px}
.gs{display:flex;justify-content:space-between;font-size:12px;color:var(--t2)}

/* Modal */
.mo{position:fixed;inset:0;z-index:200;background:rgba(0,0,0,0);pointer-events:none;transition:background .3s}
.mo.show{background:rgba(0,0,0,.5);pointer-events:auto}
.ms{position:absolute;bottom:0;left:0;right:0;background:var(--mbg);border-radius:14px 14px 0 0;transform:translateY(100%);transition:transform .4s cubic-bezier(.32,.72,0,1);padding:0 0 calc(var(--sab) + 16px);max-height:90vh;overflow-y:auto;will-change:transform}
.mo.show .ms{transform:translateY(0)}
.mha{padding:10px 0 4px;cursor:grab;touch-action:none}
.mhl{width:36px;height:5px;background:var(--mh);border-radius:3px;margin:0 auto}
.mt2{font-size:17px;font-weight:600;text-align:center;padding:6px 16px 12px}
.mbd{padding:0 16px 12px}
.fg{margin-bottom:12px}
.fl2{font-size:13px;color:var(--t2);margin-bottom:4px;padding-left:4px}
.fi2{width:100%;padding:11px 12px;font-size:16px;border:none;background:var(--fill);border-radius:10px;font-family:inherit;outline:none;-webkit-appearance:none;appearance:none;color:var(--t)}
.fi2:focus{box-shadow:0 0 0 2px var(--blue);background:var(--card)}
.fi2::placeholder{color:var(--t3)}
.tt2{display:flex;gap:2px;background:var(--fill);border-radius:10px;padding:2px;position:relative}
.tb2{flex:1;padding:9px;border:none;background:0 0;font-size:14px;font-weight:500;border-radius:8px;cursor:pointer;font-family:inherit;color:var(--t2);transition:background .2s,color .2s}
.tb2.ai{background:var(--grn-bg);color:var(--grn)}.tb2.ae{background:var(--red-bg);color:var(--red)}
.mact{display:flex;gap:8px;padding:0 16px 6px}
.mbtn{flex:1;padding:13px;border:none;border-radius:12px;font-size:16px;font-weight:600;cursor:pointer;font-family:inherit}
.mbtn:active{transform:scale(.97)}
.bp{background:var(--blue);color:#fff}.bd{background:var(--red-bg);color:var(--red)}.bs2{background:var(--fill);color:var(--t)}
.ptog{display:flex;align-items:center;padding:8px 8px;gap:8px;cursor:pointer;border-radius:8px;margin:0 -8px}
.ptog+.ptog{border-top:.5px solid var(--sep)}
.ptc{width:22px;height:22px;border-radius:6px;border:2px solid var(--sep);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.ptc.on{background:var(--blue);border-color:var(--blue)}.ptc.on::after{content:'✓';color:#fff;font-size:12px;font-weight:700}
.ptn{flex:1;font-size:14px}.pta{font-size:13px;font-weight:500;font-variant-numeric:tabular-nums}
.pta.i{color:var(--grn)}.pta.e{color:var(--red)}
.cn{padding:8px 12px;background:var(--org-bg);border-radius:10px;font-size:12px;color:var(--org-t);margin-bottom:12px;line-height:1.4}
.da{display:flex;gap:6px;margin:10px 16px;flex-wrap:wrap}
.dab{flex:1;padding:11px;background:var(--card);border:none;border-radius:10px;font-size:13px;color:var(--blue);cursor:pointer;font-family:inherit;min-width:70px;font-weight:500}
.dab:active{background:var(--card-a)}.dab.dng{color:var(--red)}
.fab{position:fixed;right:21px;bottom:96px;z-index:110;height:40px;padding:0 16px;border-radius:20px;background:var(--blue);color:#fff;border:none;cursor:pointer;box-shadow:0 3px 12px rgba(0,0,0,.3);display:none;align-items:center;gap:4px;font-size:14px;font-weight:600;font-family:inherit}
.fab:active{transform:scale(.92)}.fab.vis{display:flex}
.fab svg{width:12px;height:12px;stroke:#fff;fill:none;stroke-width:2.5;stroke-linecap:round;stroke-linejoin:round}
.bal-card{margin:8px 16px;background:var(--card);border-radius:16px;padding:16px;text-align:center}
.bal-am{font-size:30px;font-weight:700;font-variant-numeric:tabular-nums}
.bal-sub{font-size:12px;color:var(--t2);margin-top:3px}
@media(min-width:820px){
.tbar{display:none}.mc{padding-bottom:16px}
.layout{flex-direction:row;max-width:1200px;margin:0 auto;width:100%}
.mc{flex:1;border-right:1px solid var(--sep);min-width:0}
.sc{display:flex;flex-direction:column;width:380px;flex-shrink:0;overflow-y:auto;padding-bottom:16px}
.tpan{display:block!important}.dh{display:none!important}
#pOv{border-top:1px solid var(--sep);margin-top:20px;padding-top:12px}
.fab{right:396px;bottom:16px}.cd-d{min-width:110px}
.ms{max-width:480px;left:50%;transform:translateX(-50%) translateY(100%);border-radius:14px 14px 0 0}
.mo.show .ms{transform:translateX(-50%) translateY(0)}}
@media(min-width:1100px){.sc{width:440px}.fab{right:460px}}
/* Hover effects for desktop */
@media(hover:hover){
.acc:hover{opacity:.85}
.pi:hover{background:var(--card-a)}
.cd-row:hover{background:var(--card-a)}
.abtn:hover{background:var(--card-a)}
.dab:hover{background:var(--card-a)}
.mbtn:hover{opacity:.9}
.hdr-btn:hover{background:var(--sep)}
.cmh:hover .mt{color:var(--blue)}
.cwh:hover .wl{color:var(--t)}
.cwh:hover .wr{color:var(--t2)}
.cwh:hover .wch{stroke:var(--t2)}
.ge:hover{opacity:.7}
.tbtn:hover svg{stroke:var(--blue);opacity:.7}
.tbtn:hover .tl{color:var(--blue);opacity:.7}
.fab:hover{opacity:.9}
.ptog:hover{background:var(--fill);border-radius:8px}
}
</style>
</head>
<body>
<div class="app"><div class="layout">
<div class="mc" id="mc">
 <div class="tpan on" id="pCal">
  <div class="hdr" id="hdr">
   <div class="hdr-row"><div class="hdr-title">Копилка</div>
    <button class="hdr-btn" onclick="inv();shD();if(isDt()){rT('all');document.querySelectorAll('.tpan').forEach(p=>p.classList.add('on'))}else rT(cT)" title="Обновить" aria-label="Обновить"><svg viewBox="0 0 24 24"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/></svg></button></div>
   <div class="hdr-date" id="hdrD"></div>
  </div>
  <div class="accs" id="acS"></div>
  <div id="calC"></div>
  <div style="height:20px"></div>
 </div>
</div>
<div class="sc" id="sc">
 <div class="tpan" id="pDat">
  <div class="hdr"><div class="hdr-row"><div class="hdr-title">Данные</div></div><div style="height:10px"></div></div>
  <div class="bal-card dh"><div class="bal-am" id="bD">0 ₽</div><div class="bal-sub" id="bDt"></div></div>
  <div class="sl">Счета</div><div class="cg" id="acL"></div>
  <button class="abtn" onclick="showAcM()">+ Добавить счёт</button>
  <div class="sl">Доходы</div><div class="cg" id="iL"></div>
  <div class="sl">Расходы</div><div class="cg" id="eL"></div>
  <button class="abtn" onclick="showPM()">+ Добавить платёж</button>
  <div class="sl">Синхронизация</div>

<script>
const MR=['Январь','Февраль','Март','Апрель','Май','Июнь','Июль','Август','Сентябрь','Октябрь','Ноябрь','Декабрь'];
const MG=['января','февраля','марта','апреля','мая','июня','июля','августа','сентября','октября','ноября','декабря'];
const DS=['вс','пн','вт','ср','чт','пт','сб'],DF=['воскресенье','понедельник','вторник','среда','четверг','пятница','суббота'];
const isDt=()=>window.innerWidth>=820;
const DEF={accounts:[{id:1,name:'Основной',balance:50000,color:'#007AFF'}],payments:[
{id:1,name:'зарплата',amount:80000,type:'income',dayOfMonth:10,active:true,history:[]},
{id:2,name:'аванс',amount:30000,type:'income',dayOfMonth:25,active:true,history:[]},
{id:3,name:'аренда',amount:25000,type:'expense',dayOfMonth:15,active:true,history:[]},
{id:4,name:'продукты',amount:12000,type:'expense',dayOfMonth:1,active:true,history:[]},
{id:5,name:'подписки',amount:2000,type:'expense',dayOfMonth:5,active:true,history:[]},
{id:6,name:'транспорт',amount:3500,type:'expense',dayOfMonth:20,active:true,history:[]}
],adjustments:{},dayOverrides:{},nextId:7,nextAcId:2,forecastMonths:24,theme:'auto',goals:[{id:1,name:'На отпуск',amount:200000,date:''}],nextGoalId:2,syncToken:'',syncGistId:'',snapshots:{}};
let D;
function ld(){try{const s=localStorage.getItem('kop3');if(s){const d=JSON.parse(s);if(!d.accounts){d.accounts=[{id:1,name:'Основной',balance:d.balance||73023,color:'#007AFF'}]}if(!d.dayOverrides)d.dayOverrides={};if(!d.nextAcId)d.nextAcId=2;
if(!d.goals){d.goals=[{id:1,name:'Накопления',amount:d.goal||500000,date:d.goalDate||''}];d.nextGoalId=2;delete d.goal;delete d.goalDate}
if(!d.nextGoalId)d.nextGoalId=2;if(!d.syncToken)d.syncToken='';if(!d.syncGistId)d.syncGistId='';if(!d.forecastMonths||d.forecastMonths<12)d.forecastMonths=24;if(!d.snapshots)d.snapshots={};return d}}catch(e){}return JSON.parse(JSON.stringify(DEF))}
function sv(){localStorage.setItem('kop3',JSON.stringify(D))}
D=ld();
function tBal(){return D.accounts.reduce((s,a)=>s+a.balance,0)}
function fmt(n){const ng=n<0;return(ng?'−':'')+Math.abs(Math.round(n)).toString().replace(/\B(?=(\d{3})+(?!\d))/g,' ')}
function fs(n){return(n>=0?'+':'−')+fmt(Math.abs(n))}
function ds(d){return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0')}
function pd(s){const p=s.split('-');return new Date(+p[0],+p[1]-1,+p[2])}
function dim(y,m){return new Date(y,m+1,0).getDate()}
function isT(d){const t=new Date();return d.getFullYear()===t.getFullYear()&&d.getMonth()===t.getMonth()&&d.getDate()===t.getDate()}
function esc(s){const d=document.createElement('div');d.textContent=s;return d.innerHTML}
function gAmt(p,s){if(!p.history||!p.history.length)return p.amount;let a=p.amount;for(let i=p.history.length-1;i>=0;i--){if(s<p.history[i].changedOn)a=p.history[i].oldAmount;else break}return a}
/* Format number input with thousand spaces */
function fmtIn(el){const raw=el.value.replace(/[^0-9]/g,'');const n=parseInt(raw,10);if(isNaN(n)||n===0){el.value=raw;return}const pos=el.selectionStart,oldLen=el.value.length;el.value=n.toString().replace(/\B(?=(\d{3})+(?!\d))/g,' ');const newLen=el.value.length;el.setSelectionRange(pos+newLen-oldLen,pos+newLen-oldLen)}
function numV(id){return Number((document.getElementById(id)?.value||'').replace(/\s/g,''))||0}

/* Theme */
function aTh(){const t=D.theme||'auto';document.documentElement.removeAttribute('data-theme');if(t==='dark')document.documentElement.setAttribute('data-theme','dark');else if(t==='light')document.documentElement.setAttribute('data-theme','light');const b=document.getElementById('thB');if(b)b.textContent={auto:'Тема: авто',dark:'Тема: тёмная',light:'Тема: светлая'}[t]}
function tgTh(){const o=['auto','dark','light'];D.theme=o[(o.indexOf(D.theme||'auto')+1)%3];sv();aTh();inv();rAll()}

/* Sticky positions via CSS vars */
function updSticky(){
 const hdr=document.getElementById('hdr'),accs=document.getElementById('acS');
 if(!hdr||!accs)return;
 const hH=hdr.offsetHeight,aH=accs.offsetHeight;
 const r=document.documentElement.style;
 r.setProperty('--st-accs',hH+'px');
 r.setProperty('--st-month',(hH+aH)+'px');
 r.setProperty('--st-week',(hH+aH+40)+'px');
}
document.getElementById('mc').addEventListener('scroll',function(){
 const s=this.scrollTop;
 document.getElementById('hdr').classList.toggle('compact',s>20);
 // Show header shadow only on Data/Overview tabs (not Calendar — has accounts strip)
 document.querySelectorAll('.hdr').forEach(h=>{
  const isCalHdr=h.closest('#pCal');
  h.classList.toggle('scrolled',s>10&&!isCalHdr)});
 updSticky();
});

/* Date */
function shD(){const d=new Date();document.getElementById('hdrD').textContent=DF[d.getDay()]+', '+d.getDate()+' '+MG[d.getMonth()]+' '+d.getFullYear()}

/* Accounts */
function rAc(){
 const t=tBal();let h=`<div class="acc tot"><div class="ac-n">Всего</div><div class="ac-b">${fmt(t)} ₽</div></div>`;
 D.accounts.forEach(a=>{h+=`<div class="acc" onclick="showBal(${a.id})" style="border-color:${a.color}"><div class="ac-n">${esc(a.name)}</div><div class="ac-b">${fmt(a.balance)} ₽</div></div>`});
 document.getElementById('acS').innerHTML=h;
 setTimeout(updSticky,10);
 let al='';D.accounts.forEach(a=>{al+=`<div class="pi" onclick="showAcM(${a.id})"><div class="pi-d" style="background:${a.color}"></div><div class="pi-i"><div class="pi-n">${esc(a.name)}</div></div><div class="pi-a">${fmt(a.balance)} ₽</div></div>`});
 const acL=document.getElementById('acL');if(acL)acL.innerHTML=al||'<div style="padding:14px;text-align:center;color:var(--t3)">Нет счетов</div>'}

/* Tabs */
let cT='calendar',nC=true,nO=true;
function mvP(i){const p=document.getElementById('tPl');if(p)p.style.transform='translateX('+i*100+'%)'}
function swT(t,i){
 if(isDt())return;
 // Double-tap: scroll to top/today
 if(cT===t){const mc=document.getElementById('mc');if(t==='calendar')scTd();else mc.scrollTo({top:0,behavior:'smooth'});return}
 cT=t;document.querySelectorAll('.tpan').forEach(p=>p.classList.remove('on'));document.querySelectorAll('.tbtn').forEach(b=>b.classList.remove('on'));
 const pn={calendar:'pCal',data:'pDat',overview:'pOv'}[t];document.getElementById(pn).classList.add('on');document.querySelector(`[data-t="${t}"]`).classList.add('on');
 document.getElementById('mc').appendChild(document.getElementById(pn));mvP(i!=null?i:['calendar','data','overview'].indexOf(t));rT(t)}
function rT(t){if(t==='calendar'||t==='all'){rAc();if(nC){rCal();nC=false}}if(t==='data'||t==='all'){rDat();rAc();updSyncUI()}if(t==='overview'||t==='all'){rOv();nO=false}}

/* Calendar calc with snapshots for history */
let CC=null;
function cCalc(){
 if(CC)return CC;const now=new Date(),sm=now.getMonth(),sy=now.getFullYear();
 let bal=tBal(),bdD=now.getDate();
 // Work backward from today to 1st of current month
 for(let d=bdD;d>=1;d--){const dt=new Date(sy,sm,d),s=ds(dt),dm=dim(sy,sm),ov=D.dayOverrides[s]||{};
  D.payments.forEach(p=>{if(!p.active||!p.dayOfMonth)return;
   if(p.endDate){const eK=p.endDate,cK=sy+'-'+String(sm+1).padStart(2,'0');if(cK>eK)return}
   let ed=p.dayOfMonth;if(ed>dm)ed=dm;
   const rem=(ov.removed||[]).includes(p.id);if(ed===d&&!rem){bal-=(p.type==='income'?gAmt(p,s):-gAmt(p,s))}});
  (ov.added||[]).forEach(pid=>{const p=D.payments.find(x=>x.id===pid);if(p&&p.active){bal-=(p.type==='income'?gAmt(p,ds(dt)):-gAmt(p,ds(dt)))}});
  const adj=D.adjustments[s];if(adj)adj.forEach(a=>{bal-=a.amount})}
 const months=[];const curKey=sy+'-'+String(sm+1).padStart(2,'0');
 // Generate months forward
 for(let mi=0;mi<D.forecastMonths;mi++){
  const y=sy+Math.floor((sm+mi)/12),m=(sm+mi)%12,dm=dim(y,m);
  const mKey=y+'-'+String(m+1).padStart(2,'0');
  const isPast=mKey<curKey;
  // Check for snapshot of past month
  if(isPast&&D.snapshots[mKey]){
   const snap=D.snapshots[mKey];months.push(snap);
   bal=snap.days[snap.days.length-1].bal;continue}
  const md={name:MR[m]+' '+y,y,m,days:[],net:0,weeks:[]};
  let wn=1,wd=[],wNt=0,ws=1;
  for(let d=1;d<=dm;d++){const dt=new Date(y,m,d),dow=dt.getDay(),s=ds(dt);
   if(d>1&&dow===1){md.weeks.push({n:wn,s:ws,e:d-1,days:wd,net:wNt,eb:wd.length?wd[wd.length-1].bal:bal,ht:wd.some(x=>x.td)});wn++;wd=[];wNt=0;ws=d}
   let dc=0;const dp=[];const ov=D.dayOverrides[s]||{};
   D.payments.forEach(p=>{if(!p.active)return;
    // Check endDate: if set and current month is after it, skip
    if(p.endDate){const eKey=p.endDate;const cKey=y+'-'+String(m+1).padStart(2,'0');if(cKey>eKey)return}
    let ed=p.dayOfMonth;if(ed&&ed>dm)ed=dm;
    const iS=ed&&ed===d,iA=(ov.added||[]).includes(p.id),iR=(ov.removed||[]).includes(p.id);
    if((iS&&!iR)||(!iS&&iA)){const am=gAmt(p,s);dp.push({nm:p.name,tp:p.type,am});dc+=(p.type==='income'?am:-am)}});
   const adj=D.adjustments[s]||[];
   adj.forEach(a=>{const note=a.note||'';const amt=a.amount?fs(a.amount)+' ₽':'';const lb=note&&amt?note+' '+amt:(note||amt||'корректировка');const cls=a.balUpd?'bal-upd':(a.amount>=0?'ap':'an');
    dp.push({nm:lb,tp:a.amount>=0?'income':'expense',am:Math.abs(a.amount),adj:true,cls});dc+=a.amount});
   bal+=dc;md.net+=dc;wNt+=dc;
   const day={d,dow,ds:s,ps:dp,bal,dc,td:isT(dt)};md.days.push(day);wd.push(day)}
  md.weeks.push({n:wn,s:ws,e:dm,days:wd,net:wNt,eb:wd.length?wd[wd.length-1].bal:bal,ht:wd.some(x=>x.td)});
  months.push(md);
  if(isPast&&!D.snapshots[mKey]){D.snapshots[mKey]=md;_snapNeedSave=true}}
 if(_snapNeedSave){localStorage.setItem('kop3',JSON.stringify(D));_snapNeedSave=false}
 CC=months;return months}
var _snapNeedSave=false;
function inv(){CC=null;nC=true;nO=true}

/* Render calendar */
function rCal(){
 const ms=cCalc(),fd=isDt();let h='';
 ms.forEach((mo,mi)=>{
  const nc=mo.net>=0?'p':'n',lb=mo.days[mo.days.length-1].bal;
  h+=`<div class="cm" id="m${mi}"><div class="cmh" onclick="tgM(${mi})"><span class="mt">${mo.name}</span>
   <span class="mi"><span class="mn ${nc}">${fs(mo.net)} ₽</span><span class="mb">→ ${fmt(lb)} ₽</span></span>
   <svg class="ch" viewBox="0 0 24 24"><polyline points="6 9 12 15 18 9"/></svg></div>
   <div class="cmb">`;
  mo.weeks.forEach((wk,wi)=>{
   const wc=wk.net>=0?'p':'n',rl=wk.s+(wk.s!==wk.e?' – '+wk.e:'')+' '+MG[mo.m];
   h+=`<div class="cw${wk.ht?' cur':''}" id="w${mi}_${wi}"><div class="cwh" onclick="tgW(${mi},${wi})">
    <span class="wl">неделя ${wk.n}</span><span class="wr">${rl}</span>
    <span class="wi"><span class="wn ${wc}">${fs(wk.net)} ₽</span><span class="wb">→ ${fmt(wk.eb)}</span></span>
    <svg class="wch" viewBox="0 0 24 24"><polyline points="6 9 12 15 18 9"/></svg></div>
    <div class="cwb">`;
   wk.days.forEach(day=>{
    const dn=DS[day.dow];
    const tgs=day.ps.map(p=>{const c=p.adj?(p.cls||'an'):(p.tp==='income'?'inc':'exp');return`<span class="cd-tg ${c}">${esc(p.nm)}</span>`}).join('');
    const hasBalUpd=day.ps.some(p=>p.adj&&p.cls==='bal-upd');
    const balCls=day.bal<0?' ng':(hasBalUpd?' upd':'');
    const dcH=day.dc!==0?`<span class="cd-dc">${fs(day.dc)}</span>`:'';
    h+=`<div class="cd-row${day.td?' today':''}" onclick="showDM('${day.ds}')"><div class="cd-d"><span class="cd-dn">${dn}</span>, ${day.d} ${MG[mo.m]}</div><div class="cd-t">${tgs}</div><div class="cd-r">${dcH}<div class="cd-b${balCls}">${fmt(day.bal)}</div></div></div>`});
   h+=`</div></div>`});
  // Find biggest expense in month
  let topExp='',topExpAmt=0;
  mo.days.forEach(day=>{day.ps.forEach(p=>{if(p.tp==='expense'&&!p.adj&&p.am>topExpAmt){topExpAmt=p.am;topExp=p.nm}})});
  const expDetail=topExp&&mo.net<0?` · макс: ${esc(topExp)} −${fmt(topExpAmt)}`:'';
  h+=`</div><div class="cm-sum"><div>за месяц: <span class="${nc}">${fs(mo.net)} ₽</span>${expDetail}</div><div>итого: <span>${fmt(lb)} ₽</span></div></div></div>`});
 document.getElementById('calC').innerHTML=h}

/* Smart scroll: only scroll UP to element, never down */
function scrUp(el,extraOff){
 const mc=document.getElementById('mc');
 const hdr=document.getElementById('hdr');
 const accs=document.getElementById('acS');
 // Use max possible header height (expanded) + accounts + extra
 const stickyH=(hdr?hdr.offsetHeight:60)+(accs?accs.offsetHeight:50)+extraOff+4;
 const target=el.offsetTop-stickyH;
 if(target<mc.scrollTop)mc.scrollTo({top:Math.max(0,target),behavior:'smooth'})}

/* Toggle month: max-height with sticky fix */
function tgM(mi){const el=document.getElementById('m'+mi);
 const body=el.querySelector('.cmb'),sum=el.querySelector('.cm-sum');
 if(el.classList.contains('c')){
  el.classList.remove('c');
  body.style.display='';if(sum)sum.style.display='';
  const wh=body.querySelectorAll('.cwh');wh.forEach(h=>h.style.position='relative');
  const h=body.scrollHeight;
  body.style.maxHeight='0px';body.style.overflow='hidden';
  requestAnimationFrame(()=>{body.style.maxHeight=h+'px';
   setTimeout(()=>{body.style.maxHeight='';body.style.overflow='';wh.forEach(h=>h.style.position='')},360)})
 }else{
  const wh=body.querySelectorAll('.cwh');wh.forEach(h=>h.style.position='relative');
  const h=body.scrollHeight;
  body.style.maxHeight=h+'px';body.style.overflow='hidden';
  if(sum)sum.style.display='none';
  requestAnimationFrame(()=>{body.offsetHeight;body.style.maxHeight='0px'});
  setTimeout(()=>{el.classList.add('c');body.style.display='none';body.style.maxHeight='';body.style.overflow='';
   wh.forEach(h=>h.style.position='');
   scrUp(el.querySelector('.cmh'),0)},360)}}

/* Toggle week: smooth max-height animation */
function tgW(mi,wi){
 const el=document.getElementById('w'+mi+'_'+wi),bd=el.querySelector('.cwb');
 if(el.classList.contains('c')){
  el.classList.remove('c');bd.style.display='';
  const h=bd.scrollHeight;bd.style.maxHeight='0px';
  requestAnimationFrame(()=>{bd.style.maxHeight=h+'px';
   setTimeout(()=>{bd.style.maxHeight=''},350)})
 }else{
  const h=bd.scrollHeight;bd.style.maxHeight=h+'px';
  requestAnimationFrame(()=>{bd.offsetHeight;bd.style.maxHeight='0px'});
  setTimeout(()=>{el.classList.add('c');bd.style.display='none';bd.style.maxHeight='';
   scrUp(el.querySelector('.cwh'),36)},320)}}

/* Scroll to today — expand collapsed month/week first */
function scTd(){
 const todayStr=ds(new Date());
 // Find which month and week contain today
 const ms=cCalc();let tmi=-1,twi=-1;
 ms.forEach((mo,mi)=>{mo.weeks.forEach((wk,wi)=>{wk.days.forEach(day=>{if(day.ds===todayStr){tmi=mi;twi=wi}})})});
 if(tmi<0)return;
 // Expand month if collapsed
 const mEl=document.getElementById('m'+tmi);
 if(mEl&&mEl.classList.contains('c')){
  mEl.classList.remove('c');
  const body=mEl.querySelector('.cmb'),sum=mEl.querySelector('.cm-sum');
  if(body)body.style.display='';if(sum)sum.style.display='';
 }
 // Expand week if collapsed
 const wEl=document.getElementById('w'+tmi+'_'+twi);
 if(wEl&&wEl.classList.contains('c')){
  wEl.classList.remove('c');
  const bd=wEl.querySelector('.cwb');if(bd)bd.style.display='';
 }
 // Now scroll to today after animations complete
 setTimeout(()=>{
  const el=document.querySelector('.cd-row.today');
  if(el)el.scrollIntoView({behavior:'smooth',block:'center'})},400)}

/* Data tab */
function rDat(){
 const be=document.getElementById('bD'),dl=document.getElementById('bDt');
 if(be){be.textContent=fmt(tBal())+' ₽';dl.textContent=D.accounts.length+' '+(D.accounts.length===1?'счёт':'счетов')}
 const inc=D.payments.filter(p=>p.type==='income'&&p.active),exp=D.payments.filter(p=>p.type==='expense'&&p.active);
 document.getElementById('iL').innerHTML=inc.length?inc.map(piH).join(''):'<div style="padding:14px;text-align:center;color:var(--t3)">Нет</div>';
 document.getElementById('eL').innerHTML=exp.length?exp.map(piH).join(''):'<div style="padding:14px;text-align:center;color:var(--t3)">Нет</div>'}
function piH(p){let s=p.dayOfMonth?p.dayOfMonth+'-го числа':'вручную';
 if(p.endDate){const ep=p.endDate.split('-');s+=' · до '+MR[+ep[1]-1]+' '+ep[0]}
 return`<div class="pi" onclick="showPM(${p.id})"><div class="pi-d ${p.type==='income'?'i':'e'}"></div><div class="pi-i"><div class="pi-n">${esc(p.name)}</div><div class="pi-s">${s}</div></div><div class="pi-a ${p.type==='income'?'i':'e'}">${p.type==='income'?'+':'−'}${fmt(p.amount)} ₽</div></div>`}

/* Overview */
let chart=null;
function rOv(){
 const ms=cCalc();
 // If any goal has date, limit chart to that
 let goalMonths=ms.length;

  document.getElementById('moB').innerHTML=`<div class="fg"><div class="fl2">Тип</div><div class="tt2" id="eaTT"><button class="tb2${!isInc?' ae':''}" onclick="window._eaSign=-1;document.querySelectorAll('#eaTT .tb2').forEach((b,i)=>{b.className='tb2'+(i===0?' ae':'')})">Расход</button><button class="tb2${isInc?' ai':''}" onclick="window._eaSign=1;document.querySelectorAll('#eaTT .tb2').forEach((b,i)=>{b.className='tb2'+(i===1?' ai':'')})">Доход</button></div></div><div class="fg"><div class="fl2">Сумма</div><input class="fi2" type="text" id="eaAmt" value="${fmt(Math.abs(a.amount))}" inputmode="decimal" oninput="fmtIn(this)"></div><div class="fg"><div class="fl2">Заметка</div><input class="fi2" type="text" id="eaNote" value="${esc(a.note||'')}"></div>`;
  window._eaSign=isInc?1:-1;
  document.getElementById('moA').innerHTML=`<button class="mbtn bd" onclick="rmAdj('${dStr}',${i})">Удалить</button><button class="mbtn bs2" onclick="clM()">Отмена</button><button class="mbtn bp" onclick="svEditAdj('${dStr}',${i})">Сохранить</button>`;
  opM()},200)}
function svEditAdj(dStr,i){
 const amt=Math.abs(numV('eaAmt'))*(window._eaSign||-1);
 const note=document.getElementById('eaNote').value.trim();
 D.adjustments[dStr][i]={amount:amt,note};sv();inv();clM();rAll()}

/* Sync — GitHub Gist + auto-sync */
function updSyncUI(){
 const st=document.getElementById('syncSt'),pb=document.getElementById('syncPushBtn'),pl=document.getElementById('syncPullBtn');
 if(D.syncToken&&D.syncGistId){if(st)st.textContent='подключено';if(pb)pb.disabled=false;if(pl)pl.disabled=false}
 else if(D.syncToken){if(st)st.textContent='токен есть';if(pb)pb.disabled=false;if(pl)pl.disabled=true}
 else{if(st)st.textContent='не настроено';if(pb)pb.disabled=true;if(pl)pl.disabled=true}}
function showSyncM(){
 document.getElementById('moT').textContent='GitHub Gist';
 document.getElementById('moB').innerHTML=`<div style="font-size:13px;color:var(--t2);margin-bottom:12px;line-height:1.5">Данные хранятся в приватном GitHub Gist.<br><br><b>Как получить токен:</b><br>1. Зайди на <b>github.com/settings/tokens</b><br>2. Generate new token (classic)<br>3. Отметь только <b>gist</b><br>4. Скопируй токен сюда</div>
  <div class="fg"><div class="fl2">GitHub Token</div><input class="fi2" type="password" id="mST" value="${D.syncToken||''}" placeholder="ghp_xxxx..."></div>
  <div class="fg"><div class="fl2">Gist ID (автоматически)</div><input class="fi2" type="text" id="mSG" value="${D.syncGistId||''}" placeholder="создастся при первой отправке"></div>`;
 document.getElementById('moA').innerHTML=`<button class="mbtn bs2" onclick="clM()">Отмена</button><button class="mbtn bp" onclick="svSync()">Сохранить</button>`;opM()}
function svSync(){D.syncToken=document.getElementById('mST').value.trim();D.syncGistId=(document.getElementById('mSG')?.value||'').trim();sv();updSyncUI();clM()}

const GH='https://api.github.com/gists';
function ghH(){return{'Authorization':'token '+D.syncToken,'Content-Type':'application/json','Accept':'application/vnd.github.v3+json'}}

async function syncPush(){
 if(!D.syncToken)return alert('Настройте токен');
 const btn=document.getElementById('syncPushBtn');btn.textContent='...';btn.disabled=true;
 try{
  const safe={...D};delete safe.syncToken;delete safe.syncGistId;delete safe.syncProvider;
  const p=JSON.stringify(safe,null,2);
  if(D.syncGistId){
   const r=await fetch(GH+'/'+D.syncGistId,{method:'PATCH',headers:ghH(),body:JSON.stringify({files:{'kopilka.json':{content:p}}})});
   if(!r.ok)throw new Error('Ошибка: '+r.status)
  }else{
   const r=await fetch(GH,{method:'POST',headers:ghH(),body:JSON.stringify({description:'Копилка','public':false,files:{'kopilka.json':{content:p}}})});
   if(!r.ok)throw new Error('Ошибка: '+r.status);
   const d=await r.json();if(d.id){D.syncGistId=d.id;_origSv();updSyncUI()}}
  btn.textContent='Готово ✓'
 }catch(e){btn.textContent='Ошибка';alert('Отправка: '+e.message)}
 setTimeout(()=>{btn.textContent='Отправить ↑';btn.disabled=false},2000)}

async function syncPull(){
 if(!D.syncToken||!D.syncGistId)return alert('Сначала отправьте данные');
 const btn=document.getElementById('syncPullBtn');btn.textContent='...';btn.disabled=true;
 try{
  const r=await fetch(GH+'/'+D.syncGistId,{headers:ghH()});
  if(!r.ok)throw new Error('Ошибка: '+r.status);
  const d=await r.json();const f=d.files&&d.files['kopilka.json'];
  if(!f||!f.content)throw new Error('Файл не найден');
  const nd=JSON.parse(f.content);nd.syncToken=D.syncToken;nd.syncGistId=D.syncGistId;
  D=nd;if(!D.dayOverrides)D.dayOverrides={};if(!D.accounts)D.accounts=[{id:1,name:'Основной',balance:50000,color:'#007AFF'}];
  if(!D.goals)D.goals=[{id:1,name:'На отпуск',amount:200000,date:''}];if(!D.snapshots)D.snapshots={};
  _origSv();inv();rAll();btn.textContent='Готово ✓';updSyncUI()
 }catch(e){btn.textContent='Ошибка';alert('Загрузка: '+e.message)}
 setTimeout(()=>{btn.textContent='Загрузить ↓';btn.disabled=false},2000)}

/* Auto-sync: debounced push after any sv() call */
let _syncT=null;const _origSv=sv;
sv=function(){_origSv();if(!D.syncToken||!D.syncGistId)return;clearTimeout(_syncT);
 _syncT=setTimeout(async()=>{try{const s={...D};delete s.syncToken;delete s.syncGistId;delete s.syncProvider;
  await fetch(GH+'/'+D.syncGistId,{method:'PATCH',headers:ghH(),body:JSON.stringify({files:{'kopilka.json':{content:JSON.stringify(s,null,2)}}})})}catch(e){}},3000)}
/* Auto-pull on app start */
async function autoPull(){if(!D.syncToken||!D.syncGistId)return;try{
 const r=await fetch(GH+'/'+D.syncGistId,{headers:ghH()});if(!r.ok)return;
 const d=await r.json();const f=d.files&&d.files['kopilka.json'];if(!f)return;
 const nd=JSON.parse(f.content);nd.syncToken=D.syncToken;nd.syncGistId=D.syncGistId;
 D=nd;if(!D.dayOverrides)D.dayOverrides={};if(!D.accounts)D.accounts=[{id:1,name:'Основной',balance:50000,color:'#007AFF'}];
 if(!D.goals)D.goals=[{id:1,name:'На отпуск',amount:200000,date:''}];if(!D.snapshots)D.snapshots={};
 _origSv();inv();rAll()}catch(e){}}

function expD(){const b=new Blob([JSON.stringify(D,null,2)],{type:'application/json'}),a=document.createElement('a');a.href=URL.createObjectURL(b);a.download='kopilka_'+ds(new Date())+'.json';a.click()}
function impD(e){const f=e.target.files[0];if(!f)return;const r=new FileReader();r.onload=function(ev){try{const imported=JSON.parse(ev.target.result);if(!imported.accounts&&!imported.payments){alert('Неверный формат файла');return}D=imported;if(!D.dayOverrides)D.dayOverrides={};if(!D.accounts)D.accounts=[{id:1,name:'Основной',balance:50000,color:'#007AFF'}];if(!D.goals)D.goals=[{id:1,name:'На отпуск',amount:200000,date:''}];if(!D.nextGoalId)D.nextGoalId=2;if(!D.nextAcId)D.nextAcId=2;if(!D.snapshots)D.snapshots={};sv();inv();rAll()}catch(e){alert('Ошибка чтения файла')}};r.readAsText(f);e.target.value=''}
function rstD(){if(confirm('Сбросить все данные?')){D=JSON.parse(JSON.stringify(DEF));sv();inv();rAll()}}

function rAll(){if(isDt()){rT('all');document.querySelectorAll('.tpan').forEach(p=>p.classList.add('on'))}else rT(cT)}

aTh();shD();
function initL(){
 const mc=document.getElementById('mc'),sc=document.getElementById('sc');
 mc.appendChild(document.getElementById('pCal'));
 sc.appendChild(document.getElementById('pDat'));
 sc.appendChild(document.getElementById('pOv'));
 if(isDt()){
  document.querySelectorAll('.tpan').forEach(p=>p.classList.add('on'));
  rAc();rCal();nC=false;rDat();updSyncUI();rOv()
 }else{
  cT='calendar';
  document.querySelectorAll('.tpan').forEach(p=>p.classList.remove('on'));
  document.querySelectorAll('.tbtn').forEach(b=>b.classList.remove('on'));
  document.getElementById('pCal').classList.add('on');
  document.querySelector('[data-t="calendar"]').classList.add('on');
  mvP(0);
  rAc();rCal();nC=false
 }
 setTimeout(()=>{scTd();updSticky()},500);
 setTimeout(autoPull,1500)
}
if(document.readyState==='loading'){document.addEventListener('DOMContentLoaded',initL)}else{initL()}
window.addEventListener('resize',()=>{const was=document.querySelectorAll('.tpan.on').length>1;if(was!==isDt()){inv();initL()}updSticky()});

/* Pull-to-refresh */
(function(){
 const mc=document.getElementById('mc'),ptr=document.getElementById('ptr');
 let sY=0,pulling=false,triggered=false;
 mc.addEventListener('touchstart',e=>{if(mc.scrollTop<=0){sY=e.touches[0].clientY;pulling=true;triggered=false}},{passive:true});
 mc.addEventListener('touchmove',e=>{if(!pulling)return;const dy=e.touches[0].clientY-sY;if(dy<=0){pulling=false;return}
  const p=Math.min(dy/70,1),tY=Math.min(dy*.4,60);
  ptr.style.transform='translateX(-50%) translateY('+(tY-60)+'px)';ptr.style.opacity=p;
  ptr.textContent=dy>=70?'↻ Отпустите':'↓ Потяните';triggered=dy>=70},{passive:true});
 mc.addEventListener('touchend',()=>{if(!pulling)return;pulling=false;
  if(triggered){ptr.style.transform='translateX(-50%) translateY(0px)';ptr.style.opacity='1';ptr.textContent='↻ Обновление...';
   setTimeout(()=>{inv();rAll();ptr.style.transform='translateX(-50%) translateY(-60px)';ptr.style.opacity='0'},800)}
  else{ptr.style.transform='translateX(-50%) translateY(-60px)';ptr.style.opacity='0'}})
})();
</script>
