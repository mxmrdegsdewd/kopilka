<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#F2F2F7" media="(prefers-color-scheme: light)">
<meta name="theme-color" content="#000000" media="(prefers-color-scheme: dark)">
<link rel="manifest" href="manifest.json">
<title>Копилка</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
::selection{background:rgba(0,122,255,.2);color:inherit}
:root{
--bg:#F2F2F7;--card:#FFF;--card-a:rgba(0,0,0,.04);
--t:#000;--t2:rgba(60,60,67,.6);--t3:rgba(60,60,67,.3);
--sep:rgba(60,60,67,.12);--fill:rgba(118,118,128,.12);
--blue:#007AFF;--grn:#34C759;--red:#FF3B30;--org:#FF9500;
--grn-bg:rgba(52,199,89,.12);--grn-t:#1B8E35;
--red-bg:rgba(255,59,48,.1);--red-t:#D42A20;
--org-bg:rgba(255,149,0,.1);--org-t:#B07000;
--tbar:rgba(247,247,247,.35);--tshd:rgba(0,0,0,.08);
--mbg:#F2F2F7;--mh:rgba(0,0,0,.15);
--sab:env(safe-area-inset-bottom,0px);--cwk:rgba(0,122,255,.06);
font-family:-apple-system,BlinkMacSystemFont,"SF Pro Text","Helvetica Neue","Segoe UI",system-ui,sans-serif;
color-scheme:light dark}
@media(prefers-color-scheme:dark){:root:not([data-theme="light"]){
--bg:#000;--card:#1C1C1E;--card-a:rgba(255,255,255,.06);
--t:#FFF;--t2:rgba(235,235,245,.6);--t3:rgba(235,235,245,.3);
--sep:rgba(84,84,88,.36);--fill:rgba(118,118,128,.24);
--blue:#0A84FF;--grn:#30D158;--red:#FF453A;--org:#FF9F0A;
--grn-bg:rgba(48,209,88,.16);--grn-t:#30D158;
--red-bg:rgba(255,69,58,.16);--red-t:#FF453A;
--org-bg:rgba(255,159,10,.16);--org-t:#FF9F0A;
--tbar:rgba(28,28,30,.35);--tshd:rgba(0,0,0,.5);
--mbg:#2C2C2E;--mh:rgba(255,255,255,.2);--cwk:rgba(10,132,255,.1);
--tab-inactive:rgba(235,235,245,.45)}}
:root[data-theme="dark"]{
--bg:#000;--card:#1C1C1E;--card-a:rgba(255,255,255,.06);
--t:#FFF;--t2:rgba(235,235,245,.6);--t3:rgba(235,235,245,.3);
--sep:rgba(84,84,88,.36);--fill:rgba(118,118,128,.24);
--blue:#0A84FF;--grn:#30D158;--red:#FF453A;--org:#FF9F0A;
--grn-bg:rgba(48,209,88,.16);--grn-t:#30D158;
--red-bg:rgba(255,69,58,.16);--red-t:#FF453A;
--org-bg:rgba(255,159,10,.16);--org-t:#FF9F0A;
--tbar:rgba(28,28,30,.35);--tshd:rgba(0,0,0,.5);
--mbg:#2C2C2E;--mh:rgba(255,255,255,.2);--cwk:rgba(10,132,255,.1)}
html{height:100vh;min-height:calc(100% + env(safe-area-inset-top))}
body{height:100vh;background:var(--bg);color:var(--t);overflow:hidden;-webkit-font-smoothing:antialiased;margin:0;display:flex;flex-direction:column}
.app{display:flex;flex-direction:column;height:100vh}
.layout{display:flex;flex-direction:column;flex:1;overflow:hidden}
.mc{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;overscroll-behavior-y:contain;padding-bottom:90px}
.sc{display:none}

/* Header */
.hdr{position:sticky;top:0;z-index:30;background:var(--bg);padding:calc(env(safe-area-inset-top,14px) + 6px) 16px 0 16px;box-shadow:0 4px 0 0 var(--bg);pointer-events:auto}
.hdr.has-grad::after{content:'';position:absolute;bottom:-80px;left:0;right:0;height:80px;background:linear-gradient(to bottom,var(--bg),transparent);pointer-events:none;z-index:-1;opacity:0;transition:opacity .3s}
.hdr.has-grad.scrolled::after{opacity:1}
.hdr.compact{padding:calc(env(safe-area-inset-top,6px) + 8px) 16px 0 16px}
.hdr-row{display:flex;align-items:center;justify-content:space-between}
.hdr-title{font-size:34px;font-weight:700;letter-spacing:.4px;transition:font-size .25s,line-height .25s}
.hdr.compact .hdr-title{font-size:18px;line-height:20px}
.hdr-date{font-size:13px;color:var(--t2);padding:3px 0 6px;transition:all .2s}
.hdr.compact .hdr-date{font-size:11px;padding:0 0 2px;margin-top:-5px;line-height:14px}
.hdr-hint{font-size:13px;color:var(--t2);padding:0 0 10px;transition:all .2s;display:flex;align-items:center;gap:4px;flex-wrap:wrap;cursor:pointer;position:relative;z-index:31}
.hdr.compact .hdr-hint{font-size:11px;padding:0 0 8px;line-height:14px}
.hdr-btn{width:40px;height:40px;border-radius:50%;background:var(--fill);border:.5px solid var(--sep);cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--t)}
.hdr-btn:active{opacity:.6}
.hdr-btn svg{width:18px;height:18px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;margin-left:-1px}
/* Sync indicator */
.sync-dot{width:8px;height:8px;border-radius:50%;display:inline-block;margin-left:6px;vertical-align:middle;background:var(--t3);transition:background .3s,width .25s,height .25s}
.hdr.compact .sync-dot{width:6px;height:6px}
.sync-dot.ok{background:var(--grn)}
.sync-dot.ing{background:var(--blue);animation:syncPulse 1s ease-in-out infinite}
.sync-dot.err{background:var(--red)}
.sync-dot.off{background:var(--t3)}
@keyframes syncPulse{0%,100%{opacity:1}50%{opacity:.3}}

/* Tab bar */
.tbar{position:fixed;bottom:0;left:0;right:0;z-index:100;padding:0 21px 21px;pointer-events:none}
.tbar::before{content:'';position:absolute;bottom:0;left:0;right:0;height:120px;background:linear-gradient(to bottom,transparent 0%,var(--bg) 80%);pointer-events:none;z-index:-1}
.tbar-in{position:relative;display:flex;align-items:center;width:100%;height:62px;background:var(--tbar);backdrop-filter:blur(4px);-webkit-backdrop-filter:blur(4px);border-radius:999px;box-shadow:0 2px 16px rgba(0,0,0,.15);padding:4px 6px;pointer-events:auto;border:1.5px solid rgba(255,255,255,.08)}
.tpill{position:absolute;top:4px;bottom:4px;left:4px;width:calc(33.333% - 2.67px);background:var(--fill);border-radius:999px;transition:transform .25s cubic-bezier(.4,0,.14,1);z-index:0}
.tbtn{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;padding:0 4px;border:none;background:0 0;border-radius:999px;cursor:pointer;position:relative;z-index:1;height:100%}
.tbtn:active{opacity:.6}
.tbtn svg{width:24px;height:24px;stroke:rgba(60,60,67,.45);fill:none;stroke-width:1.6;stroke-linecap:round;stroke-linejoin:round;transition:all .25s}
.tbtn.on svg{stroke:var(--blue)}
.tbtn .tl{font-size:10px;font-weight:500;color:rgba(60,60,67,.45);transition:color .25s}
.tbtn.on .tl{color:var(--blue)}
.tpan{display:none}.tpan.on{display:block}
@media(prefers-color-scheme:dark){:root:not([data-theme="light"]) .tbtn:not(.on) svg{stroke:rgba(235,235,245,.5)}:root:not([data-theme="light"]) .tbtn:not(.on) .tl{color:rgba(235,235,245,.5)}:root:not([data-theme="light"]) .tbtn:not(.on):hover svg{stroke:var(--blue)}:root:not([data-theme="light"]) .tbtn:not(.on):hover .tl{color:var(--blue)}}
:root[data-theme="dark"] .tbtn:not(.on) svg{stroke:rgba(235,235,245,.5)}
:root[data-theme="dark"] .tbtn:not(.on) .tl{color:rgba(235,235,245,.5)}
:root[data-theme="dark"] .tbtn:not(.on):hover svg{stroke:var(--blue)}
:root[data-theme="dark"] .tbtn:not(.on):hover .tl{color:var(--blue)}

/* Calendar month header — sticky z:20 */
.cm{margin-bottom:4px}
.cmh{font-size:20px;font-weight:700;padding:12px 16px 12px;position:sticky;top:var(--st-month,60px);background:var(--bg);z-index:20;display:flex;align-items:center;cursor:pointer;user-select:none;gap:8px;box-shadow:0 4px 0 0 var(--bg)}
.cmh .mt{flex:1;text-align:left}
.cm.cur .cmh .mt{color:var(--blue)}
.cmh .mi{font-size:13px;font-weight:500;color:var(--t2);display:flex;gap:12px;align-items:center;white-space:nowrap}
.mi .mn{font-weight:600}.mi .mn.p{color:var(--grn)}.mi .mn.n{color:var(--red)}
.mi .mb{color:var(--t3);font-weight:500}
.cmh .ch{width:16px;height:16px;stroke:var(--t3);fill:none;stroke-width:2.5;stroke-linecap:round;stroke-linejoin:round;transition:transform .25s;flex-shrink:0}
.cm.c .ch{transform:rotate(-90deg)}
.cmb{}
.cm.c .cmb{display:none}

/* Week header — sticky below month, z:15 */
.cw{margin:0 16px 4px}
.cwh{position:sticky;top:var(--st-week,96px);z-index:15;background:var(--bg);display:flex;align-items:center;padding:10px 10px;min-height:40px;cursor:pointer;user-select:none;gap:6px}
.cwh:active{opacity:.7}
.cw.cur .cwh{background:var(--bg)}
:root[data-theme="dark"] .cw.cur .cwh{background:var(--bg)}
@media(prefers-color-scheme:dark){:root:not([data-theme="light"]) .cw.cur .cwh{background:var(--bg)}}
.cw.cur .wl{color:var(--blue);font-weight:700}
.wl{font-size:12px;font-weight:600;color:var(--t2);letter-spacing:.2px;min-width:68px}
.wr{font-size:11px;color:var(--t3);flex:1}
.wi{display:flex;align-items:center;gap:12px;font-size:12px;font-variant-numeric:tabular-nums;white-space:nowrap}
.wi .wn{font-weight:600}.wi .wn.p{color:var(--grn)}.wi .wn.n{color:var(--red)}
.wi .wb{color:var(--t3);font-weight:500}
.wch{width:12px;height:12px;stroke:var(--t3);fill:none;stroke-width:2.5;stroke-linecap:round;stroke-linejoin:round;transition:transform .25s;flex-shrink:0}
.cw.c .wch{transform:rotate(-90deg)}
.cwb{background:var(--card);border-radius:12px;overflow:hidden;transition:max-height .3s cubic-bezier(.4,0,.2,1)}

.cd-row{display:flex;align-items:center;padding:8px 10px;gap:2px;min-height:40px;cursor:pointer}
.cd-row:active{background:var(--card-a)}
.cd-row+.cd-row{border-top:.5px solid var(--sep)}
.cd-row.today{background:rgba(0,80,200,.08)}
:root[data-theme="dark"] .cd-row.today{background:rgba(10,132,255,.12)}
:root[data-theme="dark"] .cd-row.today:hover{background:rgba(10,132,255,.25)}
@media(prefers-color-scheme:dark){:root:not([data-theme="light"]) .cd-row.today{background:rgba(10,132,255,.12)}:root:not([data-theme="light"]) .cd-row.today:hover{background:rgba(10,132,255,.25)}}
.cd-row.today .cd-d{color:var(--blue);font-weight:600}
.cd-d{font-size:13px;flex-shrink:0;min-width:72px;display:flex;align-items:center;white-space:nowrap}
.cd-dn{display:inline-block;width:18px;text-align:left;flex-shrink:0}
.cd-t{flex:1;display:flex;flex-wrap:wrap;gap:2px;min-width:0}
.cd-tg{font-size:10px;font-weight:500;padding:1px 4px;border-radius:4px;white-space:nowrap;line-height:15px}
.cd-tg.inc{background:var(--grn-bg);color:var(--grn-t)}
.cd-tg.exp{background:var(--red-bg);color:var(--red-t)}
.cd-tg.ap{background:var(--grn-bg);color:var(--grn-t)}
.cd-tg.bal-upd{background:rgba(88,86,214,.12);color:#5856D6}
.cd-b.upd{color:#5856D6}
.cd-tg.an{background:var(--org-bg);color:var(--org-t)}
.cd-tg.amt-chg{background:rgba(255,149,0,.1);color:var(--org-t)}
.cd-note{font-style:italic}
.chg-ico{width:9px;height:9px;fill:none;stroke:currentColor;stroke-width:1.5;stroke-linecap:round;stroke-linejoin:round;vertical-align:-1px}
.cd-r{display:flex;align-items:center;gap:6px;flex-shrink:0;justify-content:flex-end}
.cd-dc{font-size:11px;font-weight:500;font-variant-numeric:tabular-nums;white-space:nowrap;color:var(--t3)}
.cd-b{font-size:13px;font-weight:500;text-align:right;font-variant-numeric:tabular-nums;white-space:nowrap;min-width:52px;flex-shrink:0}
.cd-b.ng{color:var(--red)}

/* Payments, sections, cards */
.sl{font-size:13px;color:var(--t2);padding:20px 16px 6px 20px;letter-spacing:-.08px;font-weight:500}
.cg{margin:0 16px;background:var(--card);border-radius:14px;overflow:hidden}
.pi{display:flex;align-items:center;padding:11px 14px;gap:10px;cursor:pointer}
.pi:active{background:var(--card-a)}
.pi+.pi{border-top:.5px solid var(--sep)}
.pi-d{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.pi-d.i{background:var(--grn)}.pi-d.e{background:var(--red)}
.pi-i{flex:1;min-width:0}
.pi-n{font-size:16px}.pi-s{font-size:12px;color:var(--t2);margin-top:1px}
.pi-a{font-size:16px;font-weight:500;font-variant-numeric:tabular-nums;text-align:right}
.pi-a.i{color:var(--grn)}.pi-a.e{color:var(--red)}
.abtn{display:flex;align-items:center;justify-content:center;margin:6px 16px 0;padding:13px;background:var(--card);border-radius:999px;border:none;font-size:16px;font-weight:500;color:var(--blue);cursor:pointer;width:calc(100% - 32px);font-family:inherit}
.abtn:active{background:var(--card-a)}

/* Overview */
.og{display:grid;grid-template-columns:1fr 1fr;gap:2px;margin:0 16px;border-radius:14px;overflow:hidden}
.oc{background:var(--card);padding:12px;text-align:center}
.ov{font-size:18px;font-weight:700;font-variant-numeric:tabular-nums}
.ol{font-size:10px;color:var(--t2);margin-top:2px}
.chw{margin:0 16px;background:var(--card);border-radius:14px;padding:12px;height:220px}
.chw canvas{width:100%!important;height:100%!important}
.ebw{margin:0 16px;background:var(--card);border-radius:14px;overflow:hidden;overflow-x:auto}
.ebi{display:flex;align-items:center;padding:8px 14px;gap:8px;font-size:13px}
.ebi+.ebi{border-top:.5px solid var(--sep)}
.ebb{flex:1;height:5px;background:var(--fill);border-radius:3px;overflow:hidden}
.ebf{height:100%;background:var(--red);border-radius:3px}
.ebn{width:90px;flex-shrink:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}.eba{font-weight:500;font-variant-numeric:tabular-nums;min-width:60px;text-align:right}.ebp{color:var(--t2);min-width:28px;text-align:right}
.gc{margin:6px 16px 0;background:var(--card);border-radius:14px;padding:14px;cursor:pointer;position:relative}
.gc::before{content:'';position:absolute;inset:0;border-radius:14px;background:rgba(255,255,255,0);transition:background .15s;pointer-events:none}
.gc:active{background:var(--card-a)}
.gt{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px}
.gl{font-size:14px;font-weight:600}
.ge{font-size:13px;color:var(--blue);cursor:pointer;background:none;border:none;font-family:inherit}
.gb{height:7px;background:var(--fill);border-radius:4px;overflow:hidden;margin-bottom:6px}
.gf{height:100%;background:var(--grn);border-radius:4px}
.gs{display:flex;justify-content:space-between;font-size:12px;color:var(--t2)}
/* Monthly summary — table layout */
.ms-tbl{width:100%;border-collapse:collapse;font-size:13px}
.ms-tbl th{font-size:11px;color:var(--t3);font-weight:500;padding:10px 8px;text-align:right;white-space:nowrap}
.ms-tbl th:first-child{text-align:left}
.ms-tbl td{padding:8px;text-align:right;font-variant-numeric:tabular-nums;border-top:.5px solid var(--sep);white-space:nowrap}
.ms-tbl td:first-child{text-align:left;font-weight:500;color:var(--t2)}
.ms-tbl .ms-inc,.ms-tbl .ms-exp{color:var(--t2)}
.ms-tbl .ms-bal{font-weight:500}

/* Modal */
.mo{position:fixed;inset:0;z-index:200;background:rgba(0,0,0,0);pointer-events:none;transition:background .3s}
.mo.show{background:rgba(0,0,0,.35);pointer-events:auto}
.ms{position:absolute;bottom:0;left:0;right:0;background:rgba(242,242,247,.82);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border:1.5px solid rgba(0,0,0,.03);border-bottom:none;border-left:none;border-right:none;border-radius:28px 28px 0 0;transform:translateY(100%);transition:transform .4s cubic-bezier(.32,.72,0,1);padding:0 0 calc(var(--sab) + 6px);max-height:90vh;overflow-y:auto;overscroll-behavior:contain;will-change:transform;-webkit-overflow-scrolling:touch}
@media(prefers-color-scheme:dark){:root:not([data-theme="light"]) .ms{background:rgba(44,44,46,.65);border-color:rgba(255,255,255,.03)}}
:root[data-theme="dark"] .ms{background:rgba(44,44,46,.65);border-color:rgba(255,255,255,.03)}
.mo.show .ms{transform:translateY(0)}
.mha{padding:10px 0 14px;cursor:grab;touch-action:none}
.mhl{width:36px;height:5px;background:var(--mh);border-radius:3px;margin:0 auto}
.mt2{font-size:17px;font-weight:600;text-align:center;padding:6px 16px 12px}
.mbd{padding:0 20px 12px}
.fg{margin-bottom:16px}
.fl2{font-size:13px;color:var(--t2);margin-bottom:8px;padding-left:4px}
.fi2{width:100%;padding:11px 12px;font-size:16px;border:1px solid rgba(0,0,0,.06);background:rgba(255,255,255,.7);border-radius:12px;font-family:inherit;outline:none;-webkit-appearance:none;appearance:none;color:var(--t)}
@media(prefers-color-scheme:dark){:root:not([data-theme="light"]) .fi2{background:rgba(118,118,128,.16);border-color:rgba(255,255,255,.08)}}
:root[data-theme="dark"] .fi2{background:rgba(118,118,128,.16);border-color:rgba(255,255,255,.08)}
.fi2:focus{box-shadow:0 0 0 2px var(--blue);background:rgba(255,255,255,.4);border-color:transparent}
@media(prefers-color-scheme:dark){:root:not([data-theme="light"]) .fi2:focus{background:rgba(255,255,255,.1)}}
:root[data-theme="dark"] .fi2:focus{background:rgba(255,255,255,.1)}
.fi2::placeholder{color:var(--t3)}
.fi2[type="date"]{min-height:44px}
.tt2{display:flex;gap:2px;background:rgba(255,255,255,.5);border-radius:10px;padding:2px;position:relative}
@media(prefers-color-scheme:dark){:root:not([data-theme="light"]) .tt2{background:rgba(118,118,128,.16)}}
:root[data-theme="dark"] .tt2{background:rgba(118,118,128,.16)}
.tb2{flex:1;padding:9px;border:none;background:0 0;font-size:14px;font-weight:500;border-radius:8px;cursor:pointer;font-family:inherit;color:var(--t2);transition:background .2s,color .2s}
.tb2.ai{background:rgba(52,199,89,.18);color:#1B8E35}.tb2.ae{background:rgba(255,59,48,.16);color:#D42A20}
.mact{display:flex;gap:8px;padding:4px 20px 16px}
.mbtn{flex:1;padding:13px;border:none;border-radius:999px;font-size:16px;font-weight:600;cursor:pointer;font-family:inherit}
.mbtn:active{transform:scale(.97)}
.bp{background:var(--blue);color:#fff}.bd{background:rgba(255,255,255,.95);color:var(--red)}.bs2{background:rgba(255,255,255,.95);color:var(--t)}
@media(prefers-color-scheme:dark){:root:not([data-theme="light"]) .bs2{background:rgba(118,118,128,.2)}:root:not([data-theme="light"]) .bd{background:rgba(255,69,58,.18)}}
:root[data-theme="dark"] .bs2{background:rgba(118,118,128,.2)}
:root[data-theme="dark"] .bd{background:rgba(255,69,58,.18)}
.ptog{display:flex;align-items:center;padding:8px 12px;gap:8px;cursor:pointer;border-radius:12px;position:relative}
.ptog+.ptog::before{content:'';position:absolute;top:0;left:12px;right:12px;height:1px;background:rgba(0,0,0,.04)}
@media(prefers-color-scheme:dark){:root:not([data-theme="light"]) .ptog+.ptog::before{background:rgba(255,255,255,.08)}}
:root[data-theme="dark"] .ptog+.ptog::before{background:rgba(255,255,255,.08)}
/* ptog inside card container — no individual radius */
.adj-list .ptog{border-radius:0;padding:11px 12px}
.adj-list .ptog+.ptog::before{left:0;right:0}
.ptc{width:22px;height:22px;border-radius:6px;border:2px solid var(--sep);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.ptc.on{background:var(--blue);border-color:var(--blue)}.ptc.on::after{content:'✓';color:#fff;font-size:12px;font-weight:700}
.ptn{flex:1;font-size:14px}.pta{font-size:13px;font-weight:500;font-variant-numeric:tabular-nums}
.pta.i{color:var(--grn)}.pta.e{color:var(--red)}
.cn{padding:8px 12px;background:var(--org-bg);border-radius:10px;font-size:12px;color:var(--org-t);margin-bottom:12px;line-height:1.4}
.da{display:flex;flex-direction:column;gap:6px;margin:6px 16px 0}
.dab{padding:13px;background:var(--card);border:none;border-radius:999px;font-size:16px;color:var(--blue);cursor:pointer;font-family:inherit;font-weight:500;text-align:center}

 // Flatten all days across all months

 ms.forEach(mo=>{mo.days.forEach(day=>{allDays.push(day)})});
 // Find the first future day with a recurring income (not adjustment, not balUpd)

   if(p.tp==='income'&&!p.adj&&p.cls!=='bal-upd'&&p.am>0){

  if(incIdx>=0)break}
 if(incIdx<0){document.getElementById('hdrH').innerHTML='';window._hintDate=null;return}
 // Balance on the day BEFORE income = end-of-day balance after all that day's expenses

/* Calendar calc */
let CC=null;
function cCalc(){
 if(CC)return CC;const now=new Date(),sm=now.getMonth(),sy=now.getFullYear();
 // Start from tBal + all non-balUpd adjustments up to today (past months + current month)
 const todayStr=ds(new Date());
 let pastAdj=0;
 Object.entries(D.adjustments||{}).forEach(([dateKey,adjs])=>{
  if(dateKey>todayStr)return;
  (adjs||[]).forEach(adj=>{if(!adj.balUpd)pastAdj+=adj.amount})});
 let bal=tBal()+pastAdj,bdD=now.getDate();
 // Backward walk from today to day 1 — undo only payments and balUpd (NOT regular adj — they're in pastAdj)
 for(let d=bdD;d>=1;d--){const dt=new Date(sy,sm,d),s=ds(dt),dm=dim(sy,sm),ov=D.dayOverrides[s]||{};
  D.payments.forEach(p=>{if(!p.active||!p.dayOfMonth)return;
   if(p.startDate&&s<p.startDate)return;
   if(p.endDate){if(s>p.endDate)return}
   let ed=p.dayOfMonth;if(ed>dm)ed=dm;
   const rem=(ov.removed||[]).includes(p.id);if(ed===d&&!rem){bal-=(p.type==='income'?gAmt(p,s):-gAmt(p,s))}});
  (ov.added||[]).forEach(pid=>{const p=D.payments.find(x=>x.id===pid);if(p&&p.active){if(p.startDate&&s<p.startDate)return;if(p.endDate&&s>p.endDate)return;bal-=(p.type==='income'?gAmt(p,ds(dt)):-gAmt(p,ds(dt)))}});
  const adj=D.adjustments[s];if(adj)adj.forEach(a=>{if(a.balUpd)bal-=a.amount})}
 const months=[];
 for(let mi=0;mi<D.forecastMonths;mi++){
  const y=sy+Math.floor((sm+mi)/12),m=(sm+mi)%12,dm=dim(y,m);
  const md={name:MR[m]+' '+y,y,m,days:[],net:0,weeks:[]};
  let wn=1,wd=[],wNt=0,ws=1;
  for(let d=1;d<=dm;d++){const dt=new Date(y,m,d),dow=dt.getDay(),s=ds(dt);
   if(d>1&&dow===1){md.weeks.push({n:wn,s:ws,e:d-1,days:wd,net:wNt,eb:wd.length?wd[wd.length-1].bal:bal,ht:wd.some(x=>x.td)});wn++;wd=[];wNt=0;ws=d}
   let dc=0;const dp=[];const ov=D.dayOverrides[s]||{};
   // Account creation tags
   D.accounts.forEach(a=>{if(a.startDate===s){dp.push({nm:esc(a.name)+' — '+fmt(a.initialBalance)+' ₽',tp:'income',am:0,adj:true,cls:'ac-start',acColor:a.color})}});
   D.payments.forEach(p=>{if(!p.active)return;
    if(p.startDate&&s<p.startDate)return;
    if(p.endDate){if(s>p.endDate)return}
    let ed=p.dayOfMonth;if(ed&&ed>dm)ed=dm;
    const iS=ed&&ed===d,iA=(ov.added||[]).includes(p.id),iR=(ov.removed||[]).includes(p.id);
    if((iS&&!iR)||(!iS&&iA)){const am=gAmt(p,s);dp.push({nm:p.name,tp:p.type,am});dc+=(p.type==='income'?am:-am)}});
   const adj=D.adjustments[s]||[];
   // For balUpd: only show the LAST update per account in tags, but count ALL in bal
   const lastBalUpd={};
   adj.forEach(a=>{
    if(a.balUpd&&a.acId){lastBalUpd[a.acId]=a}});
   adj.forEach(a=>{
    const note=a.note||'';
    if(a.balUpd){
     bal+=a.amount; // affects balance but NOT dc (daily change display)
     if(lastBalUpd[a.acId]===a){
      const lb=(note||'обновление счёта').replace(/ ?→ ?/g,': ').replace(/ ?• ?/g,': ');
      dp.push({nm:lb,tp:a.amount>=0?'income':'expense',am:Math.abs(a.amount),adj:true,cls:'bal-upd'})}
    }else{
     const amt=a.amount?fs(a.amount)+' ₽':'';const lb=note&&amt?note+' '+amt:(note||amt||'корректировка');const cls=a.amount>=0?'ap':'an';
     dp.push({nm:lb,tp:a.amount>=0?'income':'expense',am:Math.abs(a.amount),adj:true,cls});dc+=a.amount}});
   // Amount change markers (informational only, last change per payment per day)
   D.payments.forEach(p=>{if(!p.active||!p.history||!p.history.length)return;
    const dayChanges=p.history.filter(h=>h.changedOn===s);
    if(dayChanges.length){
     const last=dayChanges[dayChanges.length-1];
     const lastIdx=p.history.indexOf(last);
     const newAmt=lastIdx<p.history.length-1?p.history[lastIdx+1].oldAmount:p.amount;
     dp.push({nm:p.name,amtChgVal:fmt(newAmt)+' ₽',tp:p.type,am:0,adj:true,cls:'amt-chg'})}});
   // Last payment marker — on the payment's actual day in the endDate month
   D.payments.forEach(p=>{if(!p.active||!p.endDate||!p.dayOfMonth)return;
    const eD=pd(p.endDate),eM=eD.getMonth(),eY=eD.getFullYear();
    if(m===eM&&y===eY){
     let ed=p.dayOfMonth;if(ed>dm)ed=dm;
     if(d===ed){
      // Append "последний" to the existing payment tag
      const existing=dp.find(x=>!x.adj&&x.nm===p.name);
      if(existing)existing.isLast=true}}});
   bal+=dc;md.net+=dc;wNt+=dc;
   const day={d,dow,ds:s,ps:dp,bal,dc,td:isT(dt)};md.days.push(day);wd.push(day)}
  md.weeks.push({n:wn,s:ws,e:dm,days:wd,net:wNt,eb:wd.length?wd[wd.length-1].bal:bal,ht:wd.some(x=>x.td)});
  months.push(md)}
 CC=months;return months}
function inv(){CC=null;nC=true;nO=true;
 // Integrity: clean up empty/zero adjustment arrays + remove dead fields
 if(D.adjustments){Object.keys(D.adjustments).forEach(k=>{
  if(!D.adjustments[k]||!D.adjustments[k].length){delete D.adjustments[k];return}
  D.adjustments[k]=D.adjustments[k].filter(a=>a&&typeof a.amount==='number'&&isFinite(a.amount)&&a.amount!==0);
  // Remove dead 'synced' field
  D.adjustments[k].forEach(a=>{delete a.synced});
  if(!D.adjustments[k].length)delete D.adjustments[k]})}
 // Integrity: clean up empty dayOverrides
 if(D.dayOverrides){Object.keys(D.dayOverrides).forEach(k=>{
  const ov=D.dayOverrides[k];if(!ov||((!ov.added||!ov.added.length)&&(!ov.removed||!ov.removed.length)))delete D.dayOverrides[k]})}
 // Clean up empty history arrays on payments
 if(D.payments)D.payments.forEach(p=>{if(p.history&&!p.history.length)delete p.history});
}

     return`<span class="cd-tg ${c}">${label}</span>`}).join('');
    const hasBalUpd=day.ps.some(p=>p.adj&&p.cls==='bal-upd');
    const balCls=day.bal<0?' ng':(hasBalUpd?' upd':'');
    const dcH=day.dc!==0?`<span class="cd-dc">${fs(day.dc)}</span>`:'';
    h+=`<div class="cd-row${day.ds===todayStr?' today':''}" onclick="showDM('${day.ds}')"><div class="cd-d"><span class="cd-dn">${dn}</span>, ${day.d} ${MG[mo.m]}</div><div class="cd-t">${tgs}</div><div class="cd-r">${dcH}<div class="cd-b${balCls}">${fmt(day.bal)}</div></div></div>`});
   h+=`</div></div>`});
  h+=`</div></div>`});
 document.getElementById('calC').innerHTML=h}

/* Encryption — AES-256-GCM + PBKDF2 via Web Crypto API */
function uint8ToBase64(buf){let s='';const c=8192;for(let i=0;i<buf.length;i+=c){s+=String.fromCharCode(...buf.subarray(i,i+c))}return btoa(s)}
async function deriveKey(password,salt){
 const enc=new TextEncoder();
 const km=await crypto.subtle.importKey('raw',enc.encode(password),{name:'PBKDF2'},false,['deriveKey']);
 return crypto.subtle.deriveKey({name:'PBKDF2',salt,iterations:600000,hash:'SHA-256'},km,{name:'AES-GCM',length:256},false,['encrypt','decrypt'])}
async function encryptData(jsonStr,password){
 const enc=new TextEncoder();
 const salt=crypto.getRandomValues(new Uint8Array(16));
 const iv=crypto.getRandomValues(new Uint8Array(12));
 const key=await deriveKey(password,salt);
 const ct=await crypto.subtle.encrypt({name:'AES-GCM',iv},key,enc.encode(jsonStr));
 // Pack: salt(16) + iv(12) + ciphertext → base64
 const buf=new Uint8Array(salt.length+iv.length+ct.byteLength);
 buf.set(salt,0);buf.set(iv,16);buf.set(new Uint8Array(ct),28);
 return JSON.stringify({encrypted:true,v:1,data:uint8ToBase64(buf)})}
async function decryptData(encStr,password){
 const obj=JSON.parse(encStr);
 if(!obj.encrypted)return encStr;
 if(obj.v!==1)throw new Error('Неподдерживаемая версия формата: v'+obj.v+'. Обновите приложение.');
 const raw=Uint8Array.from(atob(obj.data),c=>c.charCodeAt(0));
 const salt=raw.slice(0,16);
 const iv=raw.slice(16,28);
 const ct=raw.slice(28);
 const key=await deriveKey(password,salt);
 const pt=await crypto.subtle.decrypt({name:'AES-GCM',iv},key,ct);
 return new TextDecoder().decode(pt)}
function isEncrypted(str){try{const o=JSON.parse(str);return o&&o.encrypted===true}catch(e){return false}}
function getEncPassword(){return localStorage.getItem('kop3_encpw')||''}
function setEncPassword(pw){if(pw)localStorage.setItem('kop3_encpw',pw);else localStorage.removeItem('kop3_encpw')}

async function autoPull(force){if(!D.syncToken||!D.syncGistId){setSyncDot('off');return}

 const now=Date.now();if(!force&&now-_lastAutoPull<10000){return}_lastAutoPull=now;
 if(_localChanged){
  if(!force){setSyncDot('ok');return}
  // Force mode: check for conflict and merge if needed
  try{clearTimeout(_syncT);
   const chk=await fetch(GH+'/'+D.syncGistId,{headers:ghH()});
   if(chk.ok){
    const chkD=await chk.json();
    const lastPush=localStorage.getItem('kop3_lastPushAt')||'';
    const serverUpdated=chkD.updated_at||'';
    // If server was updated AFTER our last push — merge
    if(lastPush&&serverUpdated&&serverUpdated>lastPush){
     const f=chkD.files&&chkD.files['kopilka.json'];
     if(f&&f.content){
      try{
       const decrypted=await parseFromGist(f.content);
       const remote=JSON.parse(decrypted);
       // Merge adjustments: combine entries from both local and remote per date
       const localAdj=D.adjustments||{};
       const remoteAdj=remote.adjustments||{};
       const merged={};
       // Collect all date keys from both sides
       const allDates=new Set([...Object.keys(localAdj),...Object.keys(remoteAdj)]);
       allDates.forEach(dk=>{
        const la=localAdj[dk]||[];
        const ra=remoteAdj[dk]||[];
        if(!la.length){merged[dk]=ra;return}
        if(!ra.length){merged[dk]=la;return}
        // Count occurrences of each key on both sides, take max count
        const keyFn=a=>a.amount+'|'+(a.note||'')+'|'+(a.balUpd?'b'+a.acId:'');
        const lCounts={},rCounts={};
        la.forEach(a=>{const k=keyFn(a);lCounts[k]=(lCounts[k]||0)+1});
        ra.forEach(a=>{const k=keyFn(a);rCounts[k]=(rCounts[k]||0)+1});
        // Start with remote entries, then add local-only extras
        const result=[...ra];
        const rUsed={};ra.forEach(a=>{const k=keyFn(a);rUsed[k]=(rUsed[k]||0)+1});
        la.forEach(a=>{
         const k=keyFn(a);
         const inRemote=rUsed[k]||0;
         const inLocal=lCounts[k]||0;
         if(inLocal>inRemote){result.push(a);rUsed[k]=(rUsed[k]||0)+1}});
        merged[dk]=result});
       D.adjustments=merged;
       // Merge dayOverrides: union added/removed arrays
       const localOv=D.dayOverrides||{};
       const remoteOv=remote.dayOverrides||{};
       const mergedOv={...remoteOv};
       Object.keys(localOv).forEach(dk=>{
        if(!mergedOv[dk]){mergedOv[dk]=localOv[dk]}
        else{
         const ra=new Set(mergedOv[dk].added||[]);
         (localOv[dk].added||[]).forEach(id=>{if(!ra.has(id))ra.add(id)});
         const rr=new Set(mergedOv[dk].removed||[]);
         (localOv[dk].removed||[]).forEach(id=>{if(!rr.has(id))rr.add(id)});
         mergedOv[dk]={added:[...ra],removed:[...rr]}}});
       D.dayOverrides=mergedOv;
       // Structural data: take remote (accounts, payments, goals) if they differ
       // But keep local payment history changes (amount changes made offline)
       const localPayMap={};D.payments.forEach(p=>{localPayMap[p.id]=p});
       if(remote.payments)(remote.payments).forEach(rp=>{
        const lp=localPayMap[rp.id];
        if(lp&&lp.history&&lp.history.length>0){
         // Keep whichever has more history entries (likely has offline changes)
         if(!rp.history||lp.history.length>rp.history.length){rp.history=lp.history;rp.amount=lp.amount}}});
       D.accounts=remote.accounts||D.accounts;
       D.payments=remote.payments||D.payments;
       D.goals=remote.goals||D.goals;
       D.nextId=Math.max(D.nextId||0,remote.nextId||0);
       D.nextAcId=Math.max(D.nextAcId||0,remote.nextAcId||0);
       D.nextGoalId=Math.max(D.nextGoalId||0,remote.nextGoalId||0);
       inv();saveLocal()
      }catch(e){/* merge failed, just push local */}}
    }
   }
   // Push merged/local data
   const p=await prepareForGist();
   const pr=await fetch(GH+'/'+D.syncGistId,{method:'PATCH',headers:ghH(),body:JSON.stringify({files:{'kopilka.json':{content:p}}})});
   if(pr.ok){_localChanged=false;localStorage.removeItem('kop3_dirty');try{const rd=await pr.json();localStorage.setItem('kop3_lastPushAt',rd.updated_at);updLastSync('Отправлено: '+fmtSyncDate(rd.updated_at))}catch(e){}}
   setSyncDot(pr.ok?'ok':'err');return}catch(e){setSyncDot('err');return}}
 setSyncDot('ing');try{
 const r=await fetch(GH+'/'+D.syncGistId,{headers:ghH()});if(!r.ok){setSyncDot('err');return}
 if(localStorage.getItem('kop3_dirty')){setSyncDot('ok');return}
 const d=await r.json();const f=d.files&&d.files['kopilka.json'];if(!f){setSyncDot('err');return}
 // Check if remote data differs from local before overwriting
 const decrypted=await parseFromGist(f.content);
 const nd=JSON.parse(decrypted);
 delete nd.syncToken;delete nd.syncGistId;
 // Compare key data fields to avoid false mismatches from key ordering
 const localSafe={...D};delete localSafe.syncToken;delete localSafe.syncGistId;
 const same=JSON.stringify(localSafe.accounts)===JSON.stringify(nd.accounts)&&
  JSON.stringify(localSafe.payments)===JSON.stringify(nd.payments)&&
  JSON.stringify(localSafe.adjustments)===JSON.stringify(nd.adjustments)&&
  JSON.stringify(localSafe.dayOverrides)===JSON.stringify(nd.dayOverrides)&&
  JSON.stringify(localSafe.goals)===JSON.stringify(nd.goals);
 if(same){
  updLastSync('Синхронизировано: '+fmtSyncDate(d.updated_at));setSyncDot('ok');return}
 localStorage.setItem('kop3',JSON.stringify(nd));
 D=ld();
 _localChanged=false;localStorage.removeItem('kop3_dirty');saveLocal();inv();rAll();
 updLastSync('Загружено: '+fmtSyncDate(d.updated_at));setSyncDot('ok')}catch(e){setSyncDot('err')}}

async function hashPin(pin){
 const enc=new TextEncoder();
 const saltB64=localStorage.getItem('kop3_pin_salt')||'a29wM3NhbHRfZGVm';
 let salt;try{salt=Uint8Array.from(atob(saltB64),c=>c.charCodeAt(0))}catch(e){salt=new TextEncoder().encode(saltB64)}
 const km=await crypto.subtle.importKey('raw',enc.encode(pin),{name:'PBKDF2'},false,['deriveBits']);
 const bits=await crypto.subtle.deriveBits({name:'PBKDF2',salt,iterations:600000,hash:'SHA-256'},km,256);
 return uint8ToBase64(new Uint8Array(bits))}

  if(_pinAttempts>=5){_pinLockedUntil=Date.now()+30000;_pinAttempts=0;
   localStorage.setItem('kop3_pin_locked',String(_pinLockedUntil));
   localStorage.setItem('kop3_pin_attempts','0');
   document.getElementById('lockErr').textContent='5 неверных попыток. Заблокировано на 30 сек.'}
  else{document.getElementById('lockErr').textContent='Неверный PIN (попытка '+_pinAttempts+'/5)'}
  document.getElementById('lockPin').value='';return}
 _pinAttempts=0;
 localStorage.removeItem('kop3_pin_locked');localStorage.removeItem('kop3_pin_attempts');
 document.getElementById('lockScreen').style.display='none';
 document.body.classList.remove('app-locked')}
async function bioUnlock(){
 try{
  const cred=await navigator.credentials.get({publicKey:{
   challenge:crypto.getRandomValues(new Uint8Array(32)),
   allowCredentials:[{id:Uint8Array.from(atob(localStorage.getItem('kop3_bio')),c=>c.charCodeAt(0)),type:'public-key',transports:['internal']}],
   userVerification:'required',timeout:60000}});
  if(cred){_pinAttempts=0;localStorage.removeItem('kop3_pin_attempts');localStorage.removeItem('kop3_pin_locked');document.getElementById('lockScreen').style.display='none';document.body.classList.remove('app-locked')}
 }catch(e){
  if(getPinHash()){document.getElementById('lockErr').textContent='Биометрия не сработала. Введите PIN.'}
  else{document.getElementById('lockErr').textContent='Биометрия не сработала. Попробуйте ещё раз.'}}}
async function registerBiometric(){
 try{
  const cred=await navigator.credentials.create({publicKey:{
   challenge:crypto.getRandomValues(new Uint8Array(32)),
   rp:{name:'Копилка'},
   user:{id:crypto.getRandomValues(new Uint8Array(16)),name:'user',displayName:'Копилка'},
   pubKeyCredParams:[{alg:-7,type:'public-key'},{alg:-257,type:'public-key'}],
   authenticatorSelection:{authenticatorAttachment:'platform',userVerification:'required'},
   timeout:60000}});
  if(cred){localStorage.setItem('kop3_bio',uint8ToBase64(new Uint8Array(cred.rawId)));return true}
 }catch(e){alert('Face ID / Touch ID не удалось настроить: '+e.message)}
 return false}
/* Security settings modal */
function showSecM(){
 if(getPinHash()){showPinGate(()=>_showSecM());return}
 _showSecM()}
function _showSecM(){
 document.getElementById('moT').textContent='Безопасность';
 const hasPin=!!getPinHash();
 const hasBio=!!localStorage.getItem('kop3_bio');
 document.getElementById('moB').innerHTML=`
  <div class="fg"><div class="fl2">PIN-код для входа</div>
   <input class="fi2" type="password" id="secPin" inputmode="numeric" maxlength="20" placeholder="${hasPin?'Оставь пустым, чтобы не менять':'Задай PIN (мин. 4 символа)'}" autocomplete="off">
   ${hasPin?'<div style="font-size:11px;color:var(--t3);padding:2px 4px">🔒 PIN установлен.</div>':''}
  </div>
  <div class="fg"><div class="fl2">Face ID / Touch ID</div>
   <button class="dab" style="width:100%;margin:0" onclick="setupBio()">${hasBio?'✓ Настроено — нажми чтобы перенастроить':'Включить биометрию'}</button>
  </div>
  ${hasPin?'<button class="dab dng" style="width:100%;margin:8px 0 0" onclick="removePinCode()">Отключить PIN</button>':''}
  ${hasBio?'<button class="dab dng" style="width:100%;margin:4px 0 0" onclick="removeBio()">Отключить Face ID / Touch ID</button>':''}
  <div style="font-size:11px;color:var(--t3);padding:8px 4px 0;line-height:1.5">PIN защищает вход в приложение. Face ID — быстрый вход вместо PIN. Пароль шифрования настраивается в разделе GitHub.</div>`;
 document.getElementById('moA').innerHTML=`<button class="mbtn bs2" onclick="clM()">Отмена</button><button class="mbtn bp" onclick="saveSecurity()">Сохранить</button>`;opM()}
async function saveSecurity(){
 const pin=document.getElementById('secPin')?.value||'';
 if(pin){if(pin.length<4){fieldErr('secPin','Минимум 4 символа');return}await setPinCode(pin)}
 updSecSt();clM()}
async function setupBio(){
 const ok=await registerBiometric();

async function removePinCode(){
 if(!confirm('Отключить PIN-код?'))return;
 localStorage.removeItem('kop3_pin');localStorage.removeItem('kop3_pin_salt');localStorage.removeItem('kop3_bio');localStorage.removeItem('kop3_pin_locked');localStorage.removeItem('kop3_pin_attempts');clM();updSecSt();alert('PIN и биометрия отключены')}
function removeBio(){
 if(!confirm('Отключить Face ID / Touch ID?'))return;
 localStorage.removeItem('kop3_bio');clM();updSecSt();alert('Face ID / Touch ID отключён')}

aTh();shD();
// Show lock screen if PIN or biometric is set
if(getPinHash()||localStorage.getItem('kop3_bio')){showLockScreen()}
// Update security status indicator
function updSecSt(){const el=document.getElementById('secSt');if(!el)return;const parts=[];if(getPinHash())parts.push('PIN');if(localStorage.getItem('kop3_bio'))parts.push('Face ID');el.textContent=parts.length?parts.join(', '):'не настроено'}

 sc.appendChild(document.getElementById('pOv'));
 if(isDt()){

  rCal();nC=false;rDat();rAc();updSyncUI();rOv();rHint();setSyncDot(D.syncToken&&D.syncGistId?'ok':'off');loadLastSync()
 }else{

  document.querySelectorAll('.tbtn').forEach(b=>b.classList.remove('on'));
  document.getElementById('pCal').classList.add('on');
  document.querySelector('[data-t="calendar"]').classList.add('on');
  mvP(0);
  rCal();nC=false;rHint();setSyncDot(D.syncToken&&D.syncGistId?'ok':'off');loadLastSync()
 }
 setTimeout(()=>{scTd();updSticky()},500);
 // Startup sync: push if dirty, then pull
 setTimeout(()=>{if(_localChanged){flushSync();setTimeout(()=>autoPull(),2000)}else{autoPull()}},1500)
}
if(document.readyState==='loading'){document.addEventListener('DOMContentLoaded',initL)}else{initL()}
window.addEventListener('resize',()=>{const was=document.querySelectorAll('.tpan.on').length>1;if(was!==isDt()){inv();initL()}updSticky()});
// Auto-refresh when returning to the app (tab switch, app switch on mobile)
document.addEventListener('visibilitychange',()=>{
 if(document.visibilityState==='visible'){
  shD();
  inv();rAll();
  if(D.syncToken&&D.syncGistId){
   // If there are unsaved local changes, retry push (non-force, no conflict check)
   if(_localChanged){clearTimeout(_syncT);setSyncDot('ing');
    _syncT=setTimeout(async()=>{try{const p=await prepareForGist();
     const r=await fetch(GH+'/'+D.syncGistId,{method:'PATCH',headers:ghH(),body:JSON.stringify({files:{'kopilka.json':{content:p}}})});
     if(r.ok){_localChanged=false;localStorage.removeItem('kop3_dirty');try{const rd=await r.json();localStorage.setItem('kop3_lastPushAt',rd.updated_at);updLastSync('Отправлено: '+fmtSyncDate(rd.updated_at))}catch(e){}}setSyncDot(r.ok?'ok':'err')}catch(e){setSyncDot('err')}},1000)}
   else{autoPull()}}}});

/* Pull-to-refresh */
(function(){
 const mc=document.getElementById('mc'),ptr=document.getElementById('ptr');
 let sY=0,pulling=false,triggered=false;
 mc.addEventListener('touchstart',e=>{if(mc.scrollTop<=0){sY=e.touches[0].clientY;pulling=true;triggered=false}},{passive:true});
 mc.addEventListener('touchmove',e=>{if(!pulling)return;const dy=e.touches[0].clientY-sY;if(dy<=0){pulling=false;return}
  const p=Math.min(dy/120,1),tY=Math.min(dy*.35,50);
  ptr.style.transform='translateX(-50%) translateY('+(tY-60)+'px)';ptr.style.opacity=p;
  ptr.textContent=dy>=120?'↻ Отпустите':'↓ Потяните';triggered=dy>=120},{passive:true});
 mc.addEventListener('touchend',()=>{if(!pulling)return;pulling=false;
  if(triggered){ptr.textContent='↻ Обновление...';ptr.style.transform='translateX(-50%) translateY(0px)';ptr.style.opacity='1';
   doRefresh();
   setTimeout(()=>{ptr.style.transition='transform .3s,opacity .3s';ptr.style.transform='translateX(-50%) translateY(-60px)';ptr.style.opacity='0';
    setTimeout(()=>{ptr.style.transition=''},400)},600)}
  else{ptr.style.transform='translateX(-50%) translateY(-60px)';ptr.style.opacity='0'}})
})();
</script>
