const MR=['Январь','Февраль','Март','Апрель','Май','Июнь','Июль','Август','Сентябрь','Октябрь','Ноябрь','Декабрь'];

const isDt=()=>window.innerWidth>=820;

/* ── ДЕМО-ДАННЫЕ (без balance, только initialBalance) ── */
const DEF={accounts:[

],adjustments:{

'2026-05-12':[{amount:-5666,note:'подарок маме',synced:true}],
'2026-06-01':[{amount:-8000,note:'годовая подписка',synced:false}],
'2026-06-15':[{amount:-35000,note:'отпуск билеты',synced:false}],
'2026-07-01':[{amount:-48000,note:'отпуск отель + еда',synced:false}],
'2026-07-15':[{amount:-15000,note:'сувениры',synced:false}],
'2026-08-01':[{amount:50000,note:'возврат налогов',synced:false}]
},dayOverrides:{
'2026-03-15':{added:[12],removed:[]},
'2026-04-12':{added:[12],removed:[]},
'2026-05-20':{added:[12],removed:[]},
'2026-01-01':{added:[],removed:[4]}
},nextId:14,nextAcId:4,forecastMonths:24,theme:'auto',goals:[
{id:1,name:'На отпуск',amount:150000,date:'2026-09-01'},
{id:2,name:'Подушка безопасности',amount:500000,date:''},
{id:3,name:'Первый взнос квартира',amount:2000000,date:'2028-01-01'}
],nextGoalId:4,syncToken:'',syncGistId:''};

let D;

/* ══════════════ ЗАГРУЗКА + МИГРАЦИЯ ══════════════ */
function ld(){
 try{
  const s=localStorage.getItem('kop3');
  let d;
  if(s){
   d=JSON.parse(s);
   if(!d.accounts)d.accounts=[];
   if(!d.dayOverrides)d.dayOverrides={};
   if(!d.adjustments)d.adjustments={};
   if(!d.payments)d.payments=[];
   if(!d.nextAcId)d.nextAcId=2;
   if(!d.goals){d.goals=[{id:1,name:'Накопления',amount:d.goal||500000,date:d.goalDate||''}];d.nextGoalId=2;delete d.goal;delete d.goalDate}
   if(!d.nextGoalId)d.nextGoalId=2;
   if(!d.syncToken)d.syncToken='';
   if(!d.syncGistId)d.syncGistId='';
   if(!d.forecastMonths||d.forecastMonths<12)d.forecastMonths=24;
   d.forecastMonths=Math.min(d.forecastMonths,60);
   if(!d.nextId)d.nextId=Math.max(0,...(d.payments||[]).map(p=>p.id||0))+1;

   // Миграция: balance → initialBalance
   d.accounts.forEach(a=>{
    if(!Number.isFinite(a.initialBalance) && Number.isFinite(a.balance)){
     let balUpdSum=0;
     Object.values(d.adjustments||{}).forEach(adjs=>{(adjs||[]).forEach(adj=>{
      if(adj.balUpd&&adj.acId===a.id)balUpdSum+=adj.amount})});
     a.initialBalance=a.balance-balUpdSum;
    }
    delete a.balance;
    if(!a.startDate)a.startDate=ds(new Date());
    if(!/^#[0-9A-Fa-f]{6}$/.test(a.color))a.color='#007AFF';
   });
   d.payments.forEach(p=>{
    if(!Number.isFinite(p.amount))p.amount=0;
    if(p.history && p.history.length>1) p.history.sort((a,b)=>a.changedOn<b.changedOn?-1:1);
   });
   delete d.snapshots; // мёртвый код
   return d;
  }
 }catch(e){console.warn(e);}
 return JSON.parse(JSON.stringify(DEF));
}

/* ══════════════ СОХРАНЕНИЕ (без автосинхронизации) ══════════════ */
function saveLocal(){ try{ localStorage.setItem('kop3',JSON.stringify(D)); }catch(e){} }

/* Будет переопределена после sync-блока */
let sv=saveLocal;

D=ld();

/* ══════════════ ВЫЧИСЛЯЕМЫЙ БАЛАНС ══════════════ */
function getAccountBalance(a){
 const todayStr=ds(new Date());
 let sum=a.initialBalance||0;
 Object.entries(D.adjustments||{}).forEach(([dateKey,adjs])=>{
  if(dateKey>todayStr) return; // будущие balUpd не учитываем
  adjs.forEach(adj=>{ if(adj.balUpd && adj.acId===a.id) sum+=adj.amount; });
 });
 return sum;
}
function tBal(){ return D.accounts.reduce((s,a)=>s+getAccountBalance(a),0); }

/* ══════════════ УТИЛИТЫ ══════════════ */
function fmt(n){ const ng=n<0; return (ng?'−':'')+Math.abs(Math.round(n)).toString().replace(/\B(?=(\d{3})+(?!\d))/g,' '); }
function fs(n){ return (n>=0?'+':'−')+fmt(Math.abs(n)); }
function ds(d){ return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0'); }
function pd(s){ const p=s.split('-'); return new Date(+p[0],+p[1]-1,+p[2]); }
function dim(y,m){ return new Date(y,m+1,0).getDate(); }
function isT(d){ const t=new Date(); return d.getFullYear()===t.getFullYear() && d.getMonth()===t.getMonth() && d.getDate()===t.getDate(); }
function esc(s){ const d=document.createElement('div'); d.textContent=s; return d.innerHTML; }
function gAmt(p,s){
 if(!p.history || !p.history.length) return p.amount;
 let a=p.amount;
 for(let i=p.history.length-1;i>=0;i--){ if(s < p.history[i].changedOn) a=p.history[i].oldAmount; else break; }
 return a;
}
function fmtIn(el){
 const raw=el.value.replace(/[^0-9]/g,'');
 const n=parseInt(raw,10);
 if(isNaN(n) || n===0){ el.value=raw; return; }
 const pos=el.selectionStart, oldLen=el.value.length;
 el.value=n.toString().replace(/\B(?=(\d{3})+(?!\d))/g,' ');
 const newLen=el.value.length;
 el.setSelectionRange(pos+newLen-oldLen, pos+newLen-oldLen);
}
function numV(id){ return Number((document.getElementById(id)?.value||'').replace(/\s/g,''))||0; }

/* ══════════════ ТЕМА ══════════════ */
function aTh(){
 const t=D.theme||'auto';
 document.documentElement.removeAttribute('data-theme');
 if(t==='dark') document.documentElement.setAttribute('data-theme','dark');
 else if(t==='light') document.documentElement.setAttribute('data-theme','light');
 const b=document.getElementById('thB');
 if(b) b.textContent={auto:'Тема: авто', dark:'Тема: тёмная', light:'Тема: светлая'}[t];
}
function tgTh(){
 const o=['auto','dark','light'];
 D.theme=o[(o.indexOf(D.theme||'auto')+1)%3];
 inv(); sv(); aTh(); rAll();
}

/* ══════════════ STICKY ══════════════ */
let _stickyRaf=0;
function updSticky(){
 if(_stickyRaf)return;
 _stickyRaf=requestAnimationFrame(()=>{
  _stickyRaf=0;
  const hdr=document.getElementById('hdr'); if(!hdr)return;
  const hH=hdr.offsetHeight;
  const r=document.documentElement.style;
  r.setProperty('--st-month',hH+'px');
  r.setProperty('--st-week',(hH+40)+'px');
 });
}
document.getElementById('mc').addEventListener('scroll',function(){
 const s=this.scrollTop;
 document.getElementById('hdr').classList.toggle('compact',s>20);
 if(!isDt()){ this.querySelectorAll('.has-grad').forEach(h=>h.classList.toggle('scrolled',s>10)); }
 updSticky();
});
const scEl=document.getElementById('sc');
if(scEl) scEl.addEventListener('scroll',function(){
 const s=this.scrollTop;
 this.querySelectorAll('.has-grad').forEach(h=>{
  const stuck=h.offsetTop<=s+2;
  h.classList.toggle('scrolled',stuck && s>10);
 });
});

/* ══════════════ HEADER ══════════════ */
function doRefresh(){ inv(); shD(); autoPull(true); if(isDt()){ rT('all'); document.querySelectorAll('.tpan').forEach(p=>p.classList.add('on')); } else rT(cT); }
function shD(){ const d=new Date(); document.getElementById('hdrD').textContent=DF[d.getDay()]+', '+d.getDate()+' '+MG[d.getMonth()]+' '+d.getFullYear(); }
function rHint(){
 const ms=cCalc(); if(!ms.length){ window._hintDate=null; return; }
 const todayStr=ds(new Date());
 const curM=ms[0]; let upcoming=[];
 curM.days.forEach(day=>{
  if(day.ds<=todayStr) return;
  day.ps.forEach(p=>{ if(p.tp==='expense' && p.am>0 && p.cls!=='bal-upd') upcoming.push({name:p.nm,amount:p.am,adj:!!p.adj,date:day.ds,dayBal:day.bal}); });
 });
 if(ms.length>1){
  const nM=ms[1];
  nM.days.forEach(day=>{
   day.ps.forEach(p=>{ if(p.tp==='expense' && p.am>0 && !p.adj) upcoming.push({name:p.nm,amount:p.am,adj:false,date:day.ds,dayBal:day.bal}); });
  });
 }
 if(!upcoming.length){ document.getElementById('hdrH').innerHTML=''; window._hintDate=null; return; }
 upcoming.sort((a,b)=>b.amount-a.amount);
 const biggest=upcoming[0];
 const remaining=biggest.dayBal;
 const tagCls=biggest.adj?'an':'exp';
 window._hintDate=biggest.date;
 document.getElementById('hdrH').innerHTML=`${fmt(remaining)} ₽ останется после <span class="cd-tg ${tagCls}">${esc(biggest.name)}</span>`;
}

/* ══════════════ ACCOUNTS RENDER ══════════════ */
function rAc(){
 let al='';
 D.accounts.forEach(a=>{
  const bal=getAccountBalance(a);
  const sd=a.startDate?pd(a.startDate):new Date();
  const sdLabel='С '+sd.getDate()+' '+MG[sd.getMonth()]+' '+sd.getFullYear();
  al+=`<div class="pi" onclick="showAcM(${a.id})"><div class="pi-d" style="background:${a.color}"></div><div class="pi-i"><div class="pi-n">${esc(a.name)}</div><div class="pi-s">${sdLabel}</div></div><div class="pi-a">${fmt(bal)} ₽</div></div>`;
 });
 const acL=document.getElementById('acL'); if(acL) acL.innerHTML=al||'<div style="padding:14px;text-align:center;color:var(--t3)">Нет счетов</div>';
}

/* ══════════════ TABS ══════════════ */
let cT='calendar', nC=true, nO=true;
function mvP(i){ const p=document.getElementById('tPl'); if(p) p.style.transform='translateX('+i*100+'%)'; }
function swT(t,i){
 if(isDt()) return;
 if(cT===t){ const mc=document.getElementById('mc'); if(t==='calendar') scTd(); else mc.scrollTo({top:0,behavior:'smooth'}); return; }
 cT=t;
 document.querySelectorAll('.tpan').forEach(p=>p.classList.remove('on'));
 document.querySelectorAll('.tbtn').forEach(b=>b.classList.remove('on'));
 const pn={calendar:'pCal', data:'pDat', overview:'pOv'}[t];
 document.getElementById(pn).classList.add('on');
 document.querySelector(`[data-t="${t}"]`).classList.add('on');
 document.getElementById('mc').appendChild(document.getElementById(pn));
 mvP(i!=null?i:['calendar','data','overview'].indexOf(t));
 rT(t);

/* ══════════════ INVALIDATE (без reconciliation) ══════════════ */
function inv(){
 CC=null; nC=true; nO=true;
 // Очистка корректировок: удаляем нулевые
 if(D.adjustments){
  Object.keys(D.adjustments).forEach(k=>{
   if(!D.adjustments[k] || !D.adjustments[k].length){ delete D.adjustments[k]; return; }
   D.adjustments[k]=D.adjustments[k].filter(a=> a && typeof a.amount==='number' && isFinite(a.amount) && a.amount!==0);
   if(!D.adjustments[k].length) delete D.adjustments[k];
  });
 }
 // Очистка dayOverrides
 if(D.dayOverrides){
  Object.keys(D.dayOverrides).forEach(k=>{
   const ov=D.dayOverrides[k];

  });

/* ══════════════ CALENDAR CALC (без снапшотов) ══════════════ */
let CC=null, _recalcGuard=0;
function cCalc(){
 if(CC) return CC;
 const now=new Date(), sm=now.getMonth(), sy=now.getFullYear();
 let bal=tBal(), bdD=now.getDate();

 for(let d=bdD; d>=1; d--){
  const dt=new Date(sy,sm,d), s=ds(dt), dm=dim(sy,sm), ov=D.dayOverrides[s]||{};
  D.payments.forEach(p=>{
   if(!p.active || !p.dayOfMonth) return;
   if(p.endDate){ const eK=p.endDate, cK=sy+'-'+String(sm+1).padStart(2,'0'); if(cK>eK) return; }
   let ed=p.dayOfMonth; if(ed>dm) ed=dm;
   const rem=(ov.removed||[]).includes(p.id);
   if(ed===d && !rem){ bal-=(p.type==='income'?gAmt(p,s):-gAmt(p,s)); }
  });
  (ov.added||[]).forEach(pid=>{ const p=D.payments.find(x=>x.id===pid); if(p && p.active){ bal-=(p.type==='income'?gAmt(p,ds(dt)):-gAmt(p,ds(dt))); } });
  const adj=D.adjustments[s]; if(adj) adj.forEach(a=>{ bal-=a.amount; });
 }

 const months=[];
 for(let mi=0; mi<D.forecastMonths; mi++){
  const y=sy+Math.floor((sm+mi)/12), m=(sm+mi)%12, dm=dim(y,m);
  const md={name:MR[m]+' '+y, y, m, days:[], net:0, weeks:[]};
  let wn=1, wd=[], wNt=0, ws=1;
  for(let d=1; d<=dm; d++){
   const dt=new Date(y,m,d), dow=dt.getDay(), s=ds(dt);
   if(d>1 && dow===1){
    md.weeks.push({n:wn, s:ws, e:d-1, days:wd, net:wNt, eb:wd.length?wd[wd.length-1].bal:bal, ht:wd.some(x=>x.td)});
    wn++; wd=[]; wNt=0; ws=d;
   }
   let dc=0; const dp=[], ov=D.dayOverrides[s]||{};
   D.accounts.forEach(a=>{ if(a.startDate===s){ dp.push({nm:esc(a.name)+' — '+fmt(a.initialBalance)+' ₽', tp:'income', am:0, adj:true, cls:'ac-start', acColor:a.color}); } });
   D.payments.forEach(p=>{
    if(!p.active) return;
    if(p.endDate){ const eKey=p.endDate, cKey=y+'-'+String(m+1).padStart(2,'0'); if(cKey>eKey) return; }
    let ed=p.dayOfMonth; if(ed && ed>dm) ed=dm;
    const iS=ed && ed===d, iA=(ov.added||[]).includes(p.id), iR=(ov.removed||[]).includes(p.id);
    if((iS && !iR) || (!iS && iA)){ const am=gAmt(p,s); dp.push({nm:p.name, tp:p.type, am}); dc+=(p.type==='income'?am:-am); }
   });
   const adj=D.adjustments[s] || [];
   adj.forEach(a=>{
    const note=a.note||'';
    if(a.balUpd){
     const lb=(note||'обновление счёта').replace(/ ?→ ?/g,': ').replace(/ ?• ?/g,': ');
     dp.push({nm:lb, tp:a.amount>=0?'income':'expense', am:Math.abs(a.amount), adj:true, cls:'bal-upd'}); dc+=a.amount;
    }else{
     const amt=a.amount?fs(a.amount)+' ₽':'';
     const lb=note && amt?note+' '+amt:(note||amt||'корректировка');
     const cls=a.amount>=0?'ap':'an';
     dp.push({nm:lb, tp:a.amount>=0?'income':'expense', am:Math.abs(a.amount), adj:true, cls}); dc+=a.amount;
    }
   });
   bal+=dc; md.net+=dc; wNt+=dc;
   const day={d, dow, ds:s, ps:dp, bal, dc, td:isT(dt)};
   md.days.push(day); wd.push(day);
  }
  md.weeks.push({n:wn, s:ws, e:dm, days:wd, net:wNt, eb:wd.length?wd[wd.length-1].bal:bal, ht:wd.some(x=>x.td)});
  months.push(md);
 }

 const todayCheck=ds(new Date()); let todayCalcBal=null;
 months.forEach(mo=>{ mo.days.forEach(day=>{ if(day.ds===todayCheck) todayCalcBal=day.bal; }); });
 if(todayCalcBal!==null && Math.abs(todayCalcBal-tBal())>1){
  console.error('Balance mismatch! tBal='+tBal()+', calendar='+todayCalcBal);
  if(_recalcGuard<2){
   _recalcGuard++;
   CC=null;
   const result=cCalc();
   _recalcGuard=0;
   return result;
  }
  console.error('Balance mismatch persists after recalc');
 }
 _recalcGuard=0;
 CC=months; return months;
}

/* ══════════════ МОДАЛЬНЫЕ ОКНА (базовые) ══════════════ */
function opM(){ document.getElementById('moO').classList.add('show'); }
function clM(){ document.getElementById('moO').classList.remove('show'); document.getElementById('moS').style.transform=''; }
document.addEventListener('keydown',e=>{
 if(!document.getElementById('moO').classList.contains('show')) return;
 if(e.key==='Escape'){ e.preventDefault(); clM(); }
 if(e.key==='Enter' && !e.shiftKey){ const btn=document.querySelector('.mact .bp'); if(btn){ e.preventDefault(); btn.click(); } }
});
(function(){
 const sh=document.getElementById('moS');
 let startY=0,lastY=0,dragging=false,scrolling=false;
 sh.addEventListener('touchstart',function(e){ startY=e.touches[0].clientY; lastY=startY; dragging=false; scrolling=false; },{passive:true});
 sh.addEventListener('touchmove',function(e){
  const y=e.touches[0].clientY, dy=y-startY;
  if(!dragging && !scrolling){
   if(sh.scrollTop>0) scrolling=true;
   else if(dy>0){ dragging=true; sh.style.transition='none'; }
   else scrolling=true;
  }
  if(dragging){ const move=y-startY; if(move>0){ sh.style.transform=`translateY(${move}px)`; e.preventDefault(); } }
  lastY=y;
 },{passive:false});
 sh.addEventListener('touchend',function(){
  if(dragging){ sh.style.transition=''; if(lastY-startY>100) clM(); else sh.style.transform=''; }
  dragging=false; scrolling=false;
 });
})();

/* ══════════════ ПЛАТЕЖИ (showPM, svP, dlP) ══════════════ */
function showPM(id){
 const p=id?D.payments.find(x=>x.id===id):null; const isE=!!p; const tp=p?p.type:'expense';
 document.getElementById('moT').textContent=isE?'Редактировать':'Новый платёж';
 let nt=''; if(isE && p.history && p.history.length) nt=`<div class="cn">При изменении суммы старые данные сохраняются. Новая сумма — только к будущим дням.</div>`;
 const hasDay=p && p.dayOfMonth; const edVal=p && p.endDate?p.endDate:'';
 let edM='', edY=''; if(edVal){ const ep=edVal.split('-'); edY=ep[0]; edM=ep[1]; }
 const curY=new Date().getFullYear(); let ySel='<option value="">Год</option>'; for(let yi=curY; yi<=curY+10; yi++) ySel+=`<option value="${yi}"${edY==String(yi)?' selected':''}>${yi}</option>`;
 let mSel='<option value="">Месяц</option>'; MR.forEach((mn,mi)=>{ const mv=String(mi+1).padStart(2,'0'); mSel+=`<option value="${mv}"${edM===mv?' selected':''}>${mn}</option>`; });
 document.getElementById('moB').innerHTML=nt+`<div class="fg"><div class="fl2">Название</div><input class="fi2" type="text" id="mPN" value="${p?esc(p.name):''}" placeholder="подписка..."></div><div class="fg"><div class="fl2">Сумма</div><input class="fi2" type="text" id="mPA" value="${p?fmt(p.amount):''}" placeholder="0" inputmode="decimal" oninput="fmtIn(this)"></div><div class="fg"><div class="fl2">Тип</div><div class="tt2" id="tT"><button class="tb2${tp==='income'?' ai':''}" onclick="sPT('income')">Доход</button><button class="tb2${tp==='expense'?' ae':''}" onclick="sPT('expense')">Расход</button></div></div><div class="fg"><div class="fl2">День месяца (пусто — вручную)</div><input class="fi2" type="number" id="mPD" value="${p&&p.dayOfMonth?p.dayOfMonth:''}" placeholder="1–31" min="1" max="31" inputmode="numeric" oninput="clampDay(this);tgED()"></div><div class="fg" id="fgED" style="display:${hasDay?'':'none'}"><div class="fl2">Повторять до (пусто — бессрочно)</div><div style="display:flex;gap:8px"><select class="fi2" id="mPEM" style="flex:1">${mSel}</select><select class="fi2" id="mPEY" style="flex:1">${ySel}</select></div></div>`;
 window._pt=tp; window._pe=id||null;
 let a=`<button class="mbtn bs2" onclick="clM()">Отмена</button><button class="mbtn bp" onclick="svP()">Сохранить</button>`;
 if(isE) a=`<button class="mbtn bd" onclick="dlP(${id})">Удалить</button>`+a;
 document.getElementById('moA').innerHTML=a; opM();
}
function sPT(t){ window._pt=t; const b=document.querySelectorAll('#tT .tb2'); b[0].className='tb2'+(t==='income'?' ai':''); b[1].className='tb2'+(t==='expense'?' ae':''); }
function tgED(){ const fg=document.getElementById('fgED'); if(!fg) return; fg.style.display=document.getElementById('mPD').value?'':'none'; }
function clampDay(el){ let v=parseInt(el.value,10); if(isNaN(v)) return; if(v>31) el.value=31; if(v<1) el.value=1; }
function svP(){
 const n=document.getElementById('mPN').value.trim(), a=numV('mPA'), d=Number(document.getElementById('mPD').value)||null;
 const eM=document.getElementById('mPEM'), eY=document.getElementById('mPEY');
 const ed=(eY && eY.value && eM && eM.value)?eY.value+'-'+eM.value:'';
 if(!n || !a) return;
 if(window._pe){
  const p=D.payments.find(x=>x.id===window._pe);
  if(p){
   if(p.amount!==a){ if(!p.history) p.history=[]; p.history.push({oldAmount:p.amount, changedOn:ds(new Date())}); }
   p.name=n; p.amount=a; p.type=window._pt; p.dayOfMonth=d; p.endDate=ed;
  }
 }else{
  D.payments.push({id:D.nextId++, name:n, amount:a, type:window._pt, dayOfMonth:d, endDate:ed, active:true, history:[]});
 }
 inv(); sv(); clM(); rAll();
}
function dlP(id){
 if(!confirm('Удалить этот платёж?')) return;
 D.payments=D.payments.filter(p=>p.id!==id);
 // очищаем dayOverrides
 Object.keys(D.dayOverrides).forEach(k=>{
  const ov=D.dayOverrides[k];
  if(ov.added) ov.added=ov.added.filter(pid=>pid!==id);
  if(ov.removed) ov.removed=ov.removed.filter(pid=>pid!==id);
 });
 inv(); sv(); flushSync(); clM(); rAll();
}

/* ══════════════ ДЕНЬ (showDM, svDay, корректировки) ══════════════ */
let _dOv={}, _dDs='';
function showDM(dStr){
 _dDs=dStr; _dOv=JSON.parse(JSON.stringify(D.dayOverrides[dStr]||{}));
 if(!_dOv.added) _dOv.added=[]; if(!_dOv.removed) _dOv.removed=[];
 const d=pd(dStr), label=DF[d.getDay()]+', '+d.getDate()+' '+MG[d.getMonth()]+' '+d.getFullYear();
 const dm=dim(d.getFullYear(), d.getMonth()), existing=D.adjustments[dStr]||[];
 document.getElementById('moT').textContent=label;
 renderDayBody(dStr,dm,existing);
 document.getElementById('moA').innerHTML=`<button class="mbtn bs2" onclick="clM()">Закрыть</button><button class="mbtn bp" onclick="svDay()">Сохранить</button>`;
 opM();
}
function renderDayBody(dStr,dm,existing){
 const d=pd(dStr);
 const isToday = (dStr === ds(new Date()));
 // платежи
 const activeP=D.payments.filter(p=>p.active);
 let tH='<div style="margin-bottom:12px">';
 activeP.forEach(p=>{
  let ed=p.dayOfMonth; if(ed && ed>dm) ed=dm;
  const iS=ed && ed===d.getDate(), iA=_dOv.added.includes(p.id), iR=_dOv.removed.includes(p.id);
  const on=(iS && !iR) || (!iS && iA);
  const am=gAmt(p,dStr);
  tH+=`<div class="ptog" onclick="tDP(${p.id},${iS})"><div class="ptc ${on?'on':''}"></div><div class="ptn">${esc(p.name)}</div><div class="pta ${p.type==='income'?'i':'e'}">${p.type==='income'?'+':'−'}${fmt(am)} ₽</div></div>`;
 });
 tH+='</div>';
 // корректировки
 let aH=''; if(existing.length){
  aH='<div style="margin-bottom:12px">';
  existing.forEach((a,i)=>{
   const c=a.balUpd?'#5856D6':(a.amount>=0?'var(--grn)':'var(--org)');
   const label=a.balUpd?((a.note||'обновление счёта').replace(/ ?→ ?/g,': ').replace(/ ?• ?/g,': ')):(a.note||(a.amount>=0?'Доход':'Расход'));
   const amtLabel=a.balUpd?fs(a.amount)+' ₽':fs(a.amount)+' ₽';
   aH+=`<div class="ptog" onclick="editAdj('${dStr}',${i})"><span style="flex:1;font-size:14px">${esc(label)}</span><span style="font-size:14px;font-weight:600;color:${c}">${amtLabel}</span></div>`;
  });
  aH+='</div>';
 }
 // счета: readonly если не сегодня
 let acH='<div style="margin-bottom:12px">';
 D.accounts.forEach(a=>{
  const bal=getAccountBalance(a);
  const inputHtml = isToday 
    ? `<input class="fi2" type="text" id="acB_${a.id}" value="${fmt(bal)}" inputmode="decimal" oninput="fmtIn(this)">`
    : `<div style="font-size:16px;padding:11px 12px;background:var(--fill);border-radius:10px;color:var(--t2)">${fmt(bal)} ₽ <span style="font-size:12px">(только сегодня)</span></div>`;
  acH+=`<div class="ac-row"><div class="ac-row-hdr"><div class="pi-d" style="background:${a.color}"></div><div class="ac-nm">${esc(a.name)}</div><div class="ac-cur">${fmt(bal)} ₽</div></div>${inputHtml}</div>`;
 });
 acH+='</div>';
 document.getElementById('moB').innerHTML=`
  <div class="dm-sh" onclick="tgDmSec(this)"><svg viewBox="0 0 24 24"><polyline points="9 6 15 12 9 18"/></svg><span class="fl2">Платежи (${activeP.length})</span></div>
  <div class="dm-body" style="max-height:0;overflow:hidden">${tH}</div>
  ${aH?'<div class="fl2" style="padding:0 0 4px">Корректировки</div>'+aH:''}
  <div class="fl2" style="padding:6px 0 4px">Добавить корректировку</div>
  <div class="fg"><div class="fl2">Тип</div><div class="tt2" id="adjTT"><button class="tb2 ae" onclick="window._adjSign=-1;document.querySelectorAll('#adjTT .tb2').forEach((b,i)=>{b.className='tb2'+(i===0?' ae':'')})">Расход</button><button class="tb2" onclick="window._adjSign=1;document.querySelectorAll('#adjTT .tb2').forEach((b,i)=>{b.className='tb2'+(i===1?' ai':'')})">Доход</button></div></div>
  <div class="fg"><div class="fl2">Сумма</div><input class="fi2" type="text" id="mAA" placeholder="5 000" inputmode="decimal" oninput="fmtIn(this)"></div>
  <div class="fg"><div class="fl2">Заметка</div><input class="fi2" type="text" id="mANo" placeholder="на что"></div>
  <div class="fl2" style="padding:12px 0 4px">Обновить счета</div>
  ${acH}
  <div style="font-size:12px;color:var(--t3);padding:4px">Прогноз пересчитается с этого дня. Прошлые данные останутся.</div>`;
 window._adjSign=-1;
}
function tgDmSec(el){
 el.classList.toggle('open');
 const body=el.nextElementSibling;
 if(el.classList.contains('open')){
  body.style.display=''; const h=body.scrollHeight; body.style.maxHeight='0'; body.style.overflow='hidden';
  requestAnimationFrame(()=>{ body.style.maxHeight=h+'px'; setTimeout(()=>{ body.style.maxHeight=''; body.style.overflow=''; },300); });
 }else{
  const h=body.scrollHeight; body.style.maxHeight=h+'px'; body.style.overflow='hidden';
  requestAnimationFrame(()=>{ body.offsetHeight; body.style.maxHeight='0'; });
 }
}
function tDP(pid,isSch){
 if(isSch){ const ri=_dOv.removed.indexOf(pid); if(ri>=0) _dOv.removed.splice(ri,1); else _dOv.removed.push(pid); }
 else{ const ai=_dOv.added.indexOf(pid); if(ai>=0) _dOv.added.splice(ai,1); else _dOv.added.push(pid); }
 // перерисовываем только блок платежей
 const d=pd(_dDs), dm=dim(d.getFullYear(), d.getMonth());
 const pBox=document.querySelector('.dm-body'); if(!pBox) return;
 let tH='<div style="margin-bottom:12px">';
 D.payments.filter(p=>p.active).forEach(p=>{
  let ed=p.dayOfMonth; if(ed && ed>dm) ed=dm;
  const iS=ed && ed===d.getDate(), iA=_dOv.added.includes(p.id), iR=_dOv.removed.includes(p.id);
  const on=(iS && !iR) || (!iS && iA);
  const am=gAmt(p,_dDs);
  tH+=`<div class="ptog" onclick="tDP(${p.id},${iS})"><div class="ptc ${on?'on':''}"></div><div class="ptn">${esc(p.name)}</div><div class="pta ${p.type==='income'?'i':'e'}">${p.type==='income'?'+':'−'}${fmt(am)} ₽</div></div>`;
 });
 tH+='</div>';
 pBox.innerHTML=tH;
}
function svDay(){
 // сохраняем overrides
 if(_dOv.added.length || _dOv.removed.length) D.dayOverrides[_dDs]=_dOv;
 else delete D.dayOverrides[_dDs];
 // новая корректировка
 const am=numV('mAA');
 if(am && am!==0){
  const finalAm=Math.abs(am)*(window._adjSign||-1);
  const nt=(document.getElementById('mANo')?.value||'').trim();
  if(!D.adjustments[_dDs]) D.adjustments[_dDs]=[];
  D.adjustments[_dDs].push({amount:finalAm, note:nt});
  // очищаем поля (чтобы не дублировать на следующем сохранении)
  const mAA=document.getElementById('mAA'); if(mAA) mAA.value='';
  const mANo=document.getElementById('mANo'); if(mANo) mANo.value='';
 }
 // обновление счетов – только если дата = сегодня
 const isToday = (_dDs === ds(new Date()));
 if(isToday){
  D.accounts.forEach(a=>{
   const inp=document.getElementById('acB_'+a.id); if(!inp) return;
   const raw=inp.value.replace(/\s/g,''); if(!raw) return;
   const nv=Number(raw)||0;
   const cur=getAccountBalance(a);
   if(nv !== cur){
    const delta=nv - cur;
    if(delta !== 0){
     if(!D.adjustments[_dDs]) D.adjustments[_dDs]=[];
     D.adjustments[_dDs].push({amount:delta, note:a.name+': '+fmt(nv)+' ₽', balUpd:true, acId:a.id});
    }
   }
  });
 }
 // инвалидируем кэш и сохраняем (инв → сохранение)
 inv(); sv(); clM(); rAll();
}
function rmAdj(dStr,i){
 if(!confirm('Удалить эту корректировку?')) return;
 D.adjustments[dStr].splice(i,1);
 if(!D.adjustments[dStr].length) delete D.adjustments[dStr];
 inv(); sv(); flushSync(); clM(); rAll();
}
function editAdj(dStr,i){
 const a=D.adjustments[dStr][i]; if(!a) return;
 clM();
 setTimeout(()=>{
  document.getElementById('moT').textContent='Редактировать';
  const isInc=a.amount>=0;
  document.getElementById('moB').innerHTML=`<div class="fg"><div class="fl2">Тип</div><div class="tt2" id="eaTT"><button class="tb2${!isInc?' ae':''}" onclick="window._eaSign=-1;document.querySelectorAll('#eaTT .tb2').forEach((b,i)=>{b.className='tb2'+(i===0?' ae':'')})">Расход</button><button class="tb2${isInc?' ai':''}" onclick="window._eaSign=1;document.querySelectorAll('#eaTT .tb2').forEach((b,i)=>{b.className='tb2'+(i===1?' ai':'')})">Доход</button></div></div><div class="fg"><div class="fl2">Сумма</div><input class="fi2" type="text" id="eaAmt" value="${fmt(Math.abs(a.amount))}" inputmode="decimal" oninput="fmtIn(this)"></div><div class="fg"><div class="fl2">Заметка</div><input class="fi2" type="text" id="eaNote" value="${esc(a.note||'')}"></div>`;
  window._eaSign=isInc?1:-1;
  document.getElementById('moA').innerHTML=`<button class="mbtn bd" onclick="rmAdj('${dStr}',${i})">Удалить</button><button class="mbtn bs2" onclick="clM()">Отмена</button><button class="mbtn bp" onclick="svEditAdj('${dStr}',${i})">Сохранить</button>`;
  opM();
 },200);
}
function svEditAdj(dStr,i){
 const amt=Math.abs(numV('eaAmt'))*(window._eaSign||-1);
 const note=document.getElementById('eaNote').value.trim();
 D.adjustments[dStr][i]={...D.adjustments[dStr][i], amount:amt, note};
 inv(); sv(); clM(); rAll();
}

 opM();

function svSync(){ D.syncToken=document.getElementById('mST').value.trim(); D.syncGistId=(document.getElementById('mSG')?.value||'').trim(); saveLocal(); updSyncUI(); clM(); }
const GH='https://api.github.com/gists';
function ghH(){ return {'Authorization':'token '+D.syncToken, 'Content-Type':'application/json', 'Accept':'application/vnd.github.v3+json'}; }
let _syncT=null, _localChanged=false;
function setSyncDot(s){ const d=document.getElementById('syncDot'); if(d) d.className='sync-dot '+s; }
async function syncPush(){
 if(!D.syncToken) return alert('Настройте токен');
 clearTimeout(_syncT);
 const btn=document.getElementById('syncPushBtn'); btn.textContent='...'; btn.disabled=true; setSyncDot('ing');
 try{
  const safe={...D}; delete safe.syncToken; delete safe.syncGistId;
  const p=JSON.stringify(safe,null,2);
  if(D.syncGistId){
   const r=await fetch(GH+'/'+D.syncGistId, {method:'PATCH', headers:ghH(), body:JSON.stringify({files:{'kopilka.json':{content:p}}})});
   if(!r.ok) throw new Error('Ошибка: '+r.status);
  }else{
   const r=await fetch(GH, {method:'POST', headers:ghH(), body:JSON.stringify({description:'Копилка','public':false,files:{'kopilka.json':{content:p}}})});
   if(!r.ok) throw new Error('Ошибка: '+r.status);
   const d=await r.json(); if(d.id){ D.syncGistId=d.id; saveLocal(); updSyncUI(); }
  }
  btn.textContent='Готово ✓'; setSyncDot('ok');
 }catch(e){ btn.textContent='Ошибка'; setSyncDot('err'); alert('Отправка: '+e.message); }
 setTimeout(()=>{ btn.textContent='Отправить ↑'; btn.disabled=false; },2000);
}
async function syncPull(){
 if(!D.syncToken || !D.syncGistId) return alert('Сначала отправьте данные');
 const btn=document.getElementById('syncPullBtn'); btn.textContent='...'; btn.disabled=true; setSyncDot('ing');
 try{
  const r=await fetch(GH+'/'+D.syncGistId, {headers:ghH()});
  if(!r.ok) throw new Error('Ошибка: '+r.status);
  const d=await r.json(); const f=d.files && d.files['kopilka.json'];
  if(!f || !f.content) throw new Error('Файл не найден');
  const nd=JSON.parse(f.content);
  nd.syncToken=D.syncToken; nd.syncGistId=D.syncGistId;
  localStorage.setItem('kop3', JSON.stringify(nd));
  D=ld(); // полная миграция
  _localChanged=false; localStorage.removeItem('kop3_dirty');
  inv(); rAll(); btn.textContent='Готово ✓'; updSyncUI(); setSyncDot('ok');
 }catch(e){ btn.textContent='Ошибка'; setSyncDot('err'); alert('Загрузка: '+e.message); }
 setTimeout(()=>{ btn.textContent='Загрузить ↓'; btn.disabled=false; },2000);
}
function saveAndSync(){
 saveLocal();
 if(!D.syncToken || !D.syncGistId){ setSyncDot('off'); return; }
 _localChanged=true; localStorage.setItem('kop3_dirty','1');
 clearTimeout(_syncT); setSyncDot('ing');
 _syncT=setTimeout(async()=>{
  try{
   const s={...D}; delete s.syncToken; delete s.syncGistId;
   const r=await fetch(GH+'/'+D.syncGistId, {method:'PATCH', headers:ghH(), body:JSON.stringify({files:{'kopilka.json':{content:JSON.stringify(s,null,2)}}})});
   if(r.ok){ _localChanged=false; localStorage.removeItem('kop3_dirty'); setSyncDot('ok'); }
   else setSyncDot('err');
  }catch(e){ setSyncDot('err'); }
 },3000);
}
sv=saveAndSync; // переопределяем глобальную sv
function flushSync(){
 if(!D.syncToken || !D.syncGistId) return;
 clearTimeout(_syncT); setSyncDot('ing');
 const s={...D}; delete s.syncToken; delete s.syncGistId;
 fetch(GH+'/'+D.syncGistId, {method:'PATCH', headers:ghH(), body:JSON.stringify({files:{'kopilka.json':{content:JSON.stringify(s,null,2)}}})})
  .then(r=>{ if(r.ok){ _localChanged=false; localStorage.removeItem('kop3_dirty'); setSyncDot('ok'); } else setSyncDot('err'); })
  .catch(()=>setSyncDot('err'));
}
async function autoPull(force){
 if(!D.syncToken || !D.syncGistId){ setSyncDot('off'); return; }
 if(_localChanged){
  if(!force){ setSyncDot('ok'); return; }
  try{ clearTimeout(_syncT); const s={...D}; delete s.syncToken; delete s.syncGistId;
   const pr=await fetch(GH+'/'+D.syncGistId, {method:'PATCH', headers:ghH(), body:JSON.stringify({files:{'kopilka.json':{content:JSON.stringify(s,null,2)}}})});
   if(pr.ok){ _localChanged=false; localStorage.removeItem('kop3_dirty'); }
  }catch(e){}
 }
 setSyncDot('ing');
 try{
  const r=await fetch(GH+'/'+D.syncGistId, {headers:ghH()}); if(!r.ok){ setSyncDot('err'); return; }
  if(localStorage.getItem('kop3_dirty')){ setSyncDot('ok'); return; }
  const d=await r.json(); const f=d.files && d.files['kopilka.json']; if(!f){ setSyncDot('err'); return; }
  const nd=JSON.parse(f.content);
  nd.syncToken=D.syncToken; nd.syncGistId=D.syncGistId;
  localStorage.setItem('kop3', JSON.stringify(nd));
  D=ld();
  _localChanged=false; localStorage.removeItem('kop3_dirty');
  inv(); rAll(); setSyncDot('ok');
 }catch(e){ setSyncDot('err'); }
}

/* ══════════════ ЭКСПОРТ / ИМПОРТ / СБРОС ══════════════ */
function expD(){ const b=new Blob([JSON.stringify(D,null,2)],{type:'application/json'}), u=URL.createObjectURL(b), a=document.createElement('a'); a.href=u; a.download='kopilka_'+ds(new Date())+'.json'; a.click(); setTimeout(()=>URL.revokeObjectURL(u),1000); }
function impD(e){ const f=e.target.files[0]; if(!f) return; const r=new FileReader(); r.onload=function(ev){ try{ const imported=JSON.parse(ev.target.result); if(!imported.accounts && !imported.payments){ alert('Неверный формат файла'); return; } D=imported; if(!D.dayOverrides) D.dayOverrides={}; if(!D.adjustments) D.adjustments={}; if(!D.payments) D.payments=[]; if(!D.accounts) D.accounts=[{id:1,name:'Основной',initialBalance:0,color:'#007AFF'}]; if(!D.goals) D.goals=[{id:1,name:'На отпуск',amount:200000,date:''}]; if(!D.nextGoalId) D.nextGoalId=2; if(!D.nextAcId) D.nextAcId=2; if(!D.nextId) D.nextId=Math.max(0,...(D.payments||[]).map(p=>p.id||0))+1; D.accounts.forEach(a=>{ if(!Number.isFinite(a.initialBalance)) a.initialBalance=0; if(!a.startDate) a.startDate=ds(new Date()); if(!/^#[0-9A-Fa-f]{6}$/.test(a.color)) a.color='#007AFF'; delete a.balance; }); inv(); sv(); rAll(); }catch(e){ alert('Ошибка чтения файла'); } }; r.readAsText(f); e.target.value=''; }

 document.getElementById('moT').textContent='Сброс данных';

 opM();
}

function rAll(){ if(isDt()){ rT('all'); document.querySelectorAll('.tpan').forEach(p=>p.classList.add('on')); } else rT(cT); }

 const mc=document.getElementById('mc'), sc=document.getElementById('sc');

 sc.appendChild(document.getElementById('pOv'));

/* ══════════════ PULL-TO-REFRESH ══════════════ */
(function(){
 const mc=document.getElementById('mc'), ptr=document.getElementById('ptr');
 let sY=0, pulling=false, triggered=false;
 mc.addEventListener('touchstart',e=>{ if(mc.scrollTop<=0){ sY=e.touches[0].clientY; pulling=true; triggered=false; } },{passive:true});
 mc.addEventListener('touchmove',e=>{
  if(!pulling) return;
  const dy=e.touches[0].clientY-sY;
  if(dy<=0){ pulling=false; return; }
  const p=Math.min(dy/120,1), tY=Math.min(dy*.35,50);
  ptr.style.transform='translateX(-50%) translateY('+(tY-60)+'px)';
  ptr.style.opacity=p;
  ptr.textContent=dy>=120?'↻ Отпустите':'↓ Потяните';
  triggered=dy>=120;
 },{passive:true});
 mc.addEventListener('touchend',()=>{
  if(!pulling) return; pulling=false;
  if(triggered){
   ptr.textContent='↻ Обновление...';
   ptr.style.transform='translateX(-50%) translateY(0px)';
   ptr.style.opacity='1';
   doRefresh();
   setTimeout(()=>{
    ptr.style.transition='transform .3s,opacity .3s';
    ptr.style.transform='translateX(-50%) translateY(-60px)';
    ptr.style.opacity='0';
    setTimeout(()=>{ ptr.style.transition=''; },400);
   },600);
  }else{
   ptr.style.transform='translateX(-50%) translateY(-60px)';
   ptr.style.opacity='0';
  }
 });
})();
</script>
